<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Verify Document — Brothers EGY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#334155;padding:16px;max-width:640px;margin:0 auto;}
.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 20px rgba(0,0,0,0.08);margin-top:16px;}
.verified{background:#f0fdf4;border:2px solid #22c55e;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;}
.fraud{background:#fef2f2;border:2px solid #dc2626;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;}
.live-badge{background:#dbeafe;border:1px solid #3b82f6;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;color:#1d4ed8;display:inline-block;margin-bottom:10px;}
.badge-icon{font-size:28px;flex-shrink:0;}
.badge-text{font-size:14px;font-weight:800;}
.badge-sub{font-size:11px;margin-top:2px;opacity:0.8;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #e2e8f0;}
.logo{height:40px;object-fit:contain;}
table{width:100%;border-collapse:collapse;margin-top:12px;}
td{padding:9px 4px;border-bottom:1px solid #f1f5f9;font-size:13px;}
td:first-child{color:#64748b;width:42%;}
td:last-child{font-weight:600;}
.amount-paid{font-size:22px;font-weight:900;color:#16a34a;}
.amount-debt{font-size:16px;font-weight:700;color:#dc2626;}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.pill-active{background:#dcfce7;color:#166534;}
.pill-overdue{background:#fee2e2;color:#991b1b;}
.pill-closed{background:#f1f5f9;color:#475569;}
.pill-future{background:#dbeafe;color:#1e40af;}
.pill-accident{background:#fff7ed;color:#9a3412;}
.section-title{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin:16px 0 8px;}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0;}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1e40af;border-radius:50%;animation:spin 0.7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.last-updated{font-size:10px;color:#94a3b8;text-align:right;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <img class="logo" src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" alt="Brothers EGY" onerror="this.style.display='none'"/>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#64748b;">Reference</div>
      <strong style="color:#1e40af;font-size:14px;" id="ref-display">—</strong>
    </div>
  </div>
  <div class="spinner" id="spinner"></div>
  <div id="content" style="display:none;"></div>
</div>

<script>
const PROJECT = 'brothers-egy-portal';
const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;
const params = new URLSearchParams(window.location.search);
const ref = (params.get('ref') || '').replace(/[^\w\-]/g, '');

document.getElementById('ref-display').textContent = ref || 'No reference';

function fv(fields, key, fallback='—') {
  if (!fields) return fallback;
  const f = fields[key];
  if (!f) return fallback;
  return f.stringValue ?? String(f.integerValue ?? f.doubleValue ?? (f.booleanValue !== undefined ? f.booleanValue : fallback));
}

function fmtMoney(val) {
  const n = parseFloat(String(val).replace(/[£,]/g, '')) || 0;
  return '£' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(val) {
  if (!val || val === '—') return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

function statusPill(status, closed) {
  if (closed === 'true' || status === 'Closed') return `<span class="pill pill-closed">Closed</span>`;
  if (status === 'Active') return `<span class="pill pill-active">Active</span>`;
  if (status === 'Overdue') return `<span class="pill pill-overdue">Overdue</span>`;
  if (status === 'Future') return `<span class="pill pill-future">Future</span>`;
  if (status === 'Accident') return `<span class="pill pill-accident">Accident</span>`;
  return `<span class="pill pill-closed">${status||'—'}</span>`;
}

async function runQuery(collection, fieldPath, value, limit=1) {
  try {
    const body = {
      structuredQuery: {
        from: [{collectionId: collection}],
        where: {
          fieldFilter: {
            field: {fieldPath},
            op: 'EQUAL',
            value: {stringValue: value}
          }
        },
        limit: limit
      }
    };
    const res = await fetch(`${BASE}:runQuery`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) return limit===1 ? null : [];
    const results = await res.json();
    if(limit===1){
      if(!results||!results[0]||!results[0].document)return null;
      return results[0].document;
    }else{
      return results.filter(r=>r.document).map(r=>r.document);
    }
  } catch(e) { return limit===1 ? null : []; }
}

async function verify() {
  if (!ref) { showError('No reference number provided.'); return; }

  // Strategy 1: bookings by 'No.' field — always live order data
  let doc = await runQuery('bookings', 'No.', ref);
  if (doc) { showOrder(doc.fields, 'Contract / Rental Order'); return; }

  // Strategy 2: receipts by qr_ref field
  doc = await runQuery('receipts', 'qr_ref', ref);
  if (doc) { showReceipt(doc.fields); return; }

  // Strategy 3: proposals by proposal_ref field
  doc = await runQuery('proposals', 'proposal_ref', ref);
  if (doc) { showProposal(doc.fields); return; }

  // Strategy 4: contracts by qr_ref (Firestore snapshot fallback)
  doc = await runQuery('contracts', 'qr_ref', ref);
  if (doc) { showContract(doc.fields); return; }

  showError('Document not found. This reference may not exist in our system.');
}

function hide() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function showOrder(f, docType) {
  hide();
  const status = fv(f, 'بلطلا ةلاح') || fv(f, 'order_status') || '—';
  const closed = fv(f, 'closed');
  const total = parseFloat(fv(f,'قحتسملا يلامجإ (Total)')||fv(f,'إجمالي المستحق (Total)')||'0');
  const paidEGP = parseFloat(fv(f,'عوفدملا EGP')||fv(f,'المدفوع EGP')||'0');
  const paidUSD = parseFloat(fv(f,'عوفدملا USD')||fv(f,'المدفوع USD')||'0');
  const depHeld = parseFloat(fv(f,'deposit_held')||'0');
  const depReturned = parseFloat(fv(f,'deposit_returned')||'0');
  const debt = Math.max(0, total - paidEGP);
  const pickup = fv(f,'مالتسالا ناكم')||fv(f,'مكان الاستلام')||'—';
  const dropoff = fv(f,'ميلستلا ناكم')||fv(f,'مكان التسليم')||'—';
  const branch = fv(f,'رادصإلا عرف')||fv(f,'فرع الإصدار')||fv(f,'branch')||'—';
  const startDate = fv(f,'col_L')||fv(f,'pickup_date')||'—';
  const endDate = fv(f,'col_T')||fv(f,'dropoff_date')||'—';
  const clientName = fv(f,'ليمعلا مسا')||fv(f,'اسم العميل')||fv(f,'client_name')||'—';
  const carName = fv(f,'ةرايسلا مسا')||fv(f,'اسم السيارة')||fv(f,'car_label')||'—';
  const orderRef = fv(f,'No.')||ref;
  const nowStr = new Date().toLocaleString('en-GB');

  document.getElementById('content').innerHTML = `
    <div class="live-badge">🔴 LIVE DATA — Always up to date</div>
    <div class="verified">
      <div class="badge-icon">✅</div>
      <div>
        <div class="badge-text">Verified — Brothers EGY</div>
        <div class="badge-sub">${docType} #${orderRef}</div>
      </div>
    </div>

    <div class="section-title">📋 Order Details</div>
    <table>
      <tr><td>Reference</td><td>#${orderRef}</td></tr>
      <tr><td>Status</td><td>${statusPill(status, closed)}</td></tr>
      <tr><td>Client</td><td>${clientName}</td></tr>
      <tr><td>Vehicle</td><td>${carName}</td></tr>
      <tr><td>Branch</td><td>${branch}</td></tr>
      <tr><td>Pickup Date</td><td>${fmtDate(startDate)}</td></tr>
      <tr><td>Return Date</td><td>${fmtDate(endDate)}</td></tr>
      <tr><td>Pickup Location</td><td>${pickup}</td></tr>
      <tr><td>Dropoff Location</td><td>${dropoff}</td></tr>
    </table>

    <div class="section-title">💰 Financial Summary</div>
    <table>
      <tr><td>Contract Total</td><td class="amount-paid">${fmtMoney(total)}</td></tr>
      <tr><td>Total Paid (EGP)</td><td style="color:#16a34a;font-weight:700;">${fmtMoney(paidEGP)}</td></tr>
      ${paidUSD > 0 ? `<tr><td>Total Paid (USD)</td><td>$${paidUSD.toLocaleString()}</td></tr>` : ''}
      <tr><td>Outstanding Balance</td><td class="${debt > 0 ? 'amount-debt' : ''}">${debt > 0 ? fmtMoney(debt) : '✅ Fully Paid'}</td></tr>
      ${depHeld > 0 ? `<tr><td>Security Deposit</td><td>${fmtMoney(depHeld)}</td></tr>` : ''}
      ${depReturned > 0 ? `<tr><td>Deposit Returned</td><td style="color:#16a34a;">${fmtMoney(depReturned)}</td></tr>` : ''}
    </table>

    <div class="section-title">📜 Payment History</div>
    <div id="payment-history-wrap"><div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px;">Loading payment history...</div></div>

    <div class="last-updated">🕐 Data fetched live at ${nowStr}</div>
    <div class="footer">
      Brothers EGY Car Rental · This document is verified and digitally issued.<br>
      Scan QR code anytime to view the latest status of this order.
    </div>`;

  // Fetch payment history asynchronously
  try {
    const payments = await runQuery('payment_log', 'order_ref', orderRef, 50);
    const histWrap = document.getElementById('payment-history-wrap');
    if(!histWrap) return;
    if(!payments || payments.length === 0){
      histWrap.innerHTML = '<div style="color:#94a3b8;font-size:12px;padding:8px;">No individual payment records found.</div>';
      return;
    }
    payments.sort((a,b)=>{
      const da = new Date(fv(a.fields,'datetime')||fv(a.fields,'date')||0);
      const db2 = new Date(fv(b.fields,'datetime')||fv(b.fields,'date')||0);
      return da-db2;
    });
    let runningTotal = 0;
    const rows = payments.map((p,i)=>{
      const pf = p.fields;
      const amt = parseFloat(fv(pf,'amount_egp')||'0');
      const amtUSD = parseFloat(fv(pf,'amount_usd')||'0');
      const amtEUR = parseFloat(fv(pf,'amount_eur')||'0');
      runningTotal += amt;
      const dt = new Date(fv(pf,'datetime')||fv(pf,'date')||'');
      const dtStr = isNaN(dt) ? '—' : dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const method = fv(pf,'payment_method')||'Cash';
      const collector = fv(pf,'collected_by')||'—';
      const notes = fv(pf,'notes')||'';
      const amtParts = [];
      if(amt>0) amtParts.push(`£${amt.toLocaleString()} EGP`);
      if(amtUSD>0) amtParts.push(`$${amtUSD} USD`);
      if(amtEUR>0) amtParts.push(`€${amtEUR} EUR`);
      return `<tr style="background:${i%2===0?'#f8fafc':'#fff'};">
        <td style="font-size:11px;color:#64748b;padding:6px 4px;">${i+1}</td>
        <td style="font-size:12px;font-weight:600;color:#16a34a;padding:6px 4px;">${amtParts.join(' + ')||'—'}</td>
        <td style="font-size:11px;padding:6px 4px;">${dtStr}</td>
        <td style="font-size:11px;padding:6px 4px;">${method}</td>
        <td style="font-size:11px;padding:6px 4px;">${collector}</td>
        <td style="font-size:11px;color:#64748b;font-style:italic;padding:6px 4px;">${notes}</td>
        <td style="font-size:11px;color:#475569;padding:6px 4px;">£${runningTotal.toLocaleString()}</td>
      </tr>`;
    }).join('');
    histWrap.innerHTML = `
    <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr style="background:#f1f5f9;">
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">#</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Amount</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Date &amp; Time</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Method</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Collected By</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Notes</th>
          <th style="padding:6px 4px;text-align:left;color:#64748b;font-size:10px;">Running Total</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#f0fdf4;font-weight:700;">
          <td colspan="6" style="padding:8px 4px;font-size:12px;">Total Collected</td>
          <td style="padding:8px 4px;font-size:14px;color:#16a34a;">£${runningTotal.toLocaleString()} EGP</td>
        </tr>
      </tfoot>
    </table>
    </div>`;
  } catch(e) {
    const histWrap = document.getElementById('payment-history-wrap');
    if(histWrap) histWrap.innerHTML = '<div style="color:#94a3b8;font-size:12px;padding:8px;">Payment history unavailable.</div>';
  }
}

function showReceipt(f) {
  hide();
  const nowStr = new Date().toLocaleString('en-GB');
  document.getElementById('content').innerHTML = `
    <div class="live-badge">🔴 LIVE DATA</div>
    <div class="verified">
      <div class="badge-icon">🧾</div>
      <div><div class="badge-text">Receipt Verified</div><div class="badge-sub">${fv(f,'receipt_ref')}</div></div>
    </div>
    <div class="section-title">🧾 Receipt Details</div>
    <table>
      <tr><td>Contract No</td><td>#${fv(f,'contract_no')}</td></tr>
      <tr><td>Client</td><td>${fv(f,'client_name')}</td></tr>
      <tr><td>Vehicle</td><td>${fv(f,'car_label')}</td></tr>
      <tr><td>Date</td><td>${fmtDate(fv(f,'receipt_date'))}</td></tr>
      <tr><td>Amount Paid</td><td class="amount-paid">${fmtMoney(fv(f,'total_egp_equiv'))}</td></tr>
      <tr><td>Payment Details</td><td>${fv(f,'payment_details')}</td></tr>
      <tr><td>Branch</td><td>${fv(f,'branch')}</td></tr>
      <tr><td>Collected By</td><td>${fv(f,'collected_by')}</td></tr>
    </table>
    <div class="last-updated">🕐 Fetched at ${nowStr}</div>
    <div class="footer">Brothers EGY Car Rental · Official Payment Receipt</div>`;
}

function showProposal(f) {
  hide();
  const nowStr = new Date().toLocaleString('en-GB');
  document.getElementById('content').innerHTML = `
    <div class="live-badge">🔴 LIVE DATA</div>
    <div class="verified">
      <div class="badge-icon">📋</div>
      <div><div class="badge-text">Proposal Verified</div><div class="badge-sub">${fv(f,'proposal_ref')}</div></div>
    </div>
    <div class="section-title">📋 Proposal Details</div>
    <table>
      <tr><td>Reference</td><td>#${fv(f,'proposal_ref')}</td></tr>
      <tr><td>Client</td><td>${fv(f,'client_name')}</td></tr>
      <tr><td>Vehicle</td><td>${fv(f,'car_label')}</td></tr>
      <tr><td>Status</td><td>${fv(f,'status')}</td></tr>
      <tr><td>Pickup</td><td>${fmtDate(fv(f,'pickup_date'))}</td></tr>
      <tr><td>Return</td><td>${fmtDate(fv(f,'dropoff_date'))}</td></tr>
      <tr><td>Estimate</td><td class="amount-paid">${fmtMoney(fv(f,'total_estimate'))}</td></tr>
      <tr><td>Daily Rate</td><td>${fmtMoney(fv(f,'daily_rate'))}/day</td></tr>
    </table>
    <div class="last-updated">🕐 Fetched at ${nowStr}</div>
    <div class="footer">Brothers EGY Car Rental · Price Proposal (Not a Contract)</div>`;
}

function showContract(f) {
  hide();
  const nowStr = new Date().toLocaleString('en-GB');
  document.getElementById('content').innerHTML = `
    <div class="live-badge">🔴 LIVE DATA</div>
    <div class="verified">
      <div class="badge-icon">📄</div>
      <div><div class="badge-text">Contract Verified</div><div class="badge-sub">${fv(f,'contract_no')}</div></div>
    </div>
    <div class="section-title">📄 Contract Details</div>
    <table>
      <tr><td>Contract No</td><td>#${fv(f,'contract_no')}</td></tr>
      <tr><td>Client</td><td>${fv(f,'client_name')}</td></tr>
      <tr><td>Vehicle</td><td>${fv(f,'car_label')}</td></tr>
      <tr><td>Branch</td><td>${fv(f,'branch')}</td></tr>
      <tr><td>Generated By</td><td>${fv(f,'generated_by')}</td></tr>
      <tr><td>Last Updated</td><td>${fmtDate(fv(f,'last_order_update'))}</td></tr>
      <tr><td>Order Status</td><td>${fv(f,'order_status')||'—'}</td></tr>
    </table>
    <div class="last-updated">🕐 Fetched at ${nowStr}</div>
    <div class="footer">Brothers EGY Car Rental · Verified Digital Document</div>`;
}

function showError(msg) {
  hide();
  document.getElementById('content').innerHTML = `
    <div class="fraud">
      <div class="badge-icon">❌</div>
      <div><div class="badge-text">Not Found</div><div class="badge-sub">${msg}</div></div>
    </div>
    <div style="font-size:13px;color:#64748b;margin-top:12px;">
      If you believe this is an error, please contact Brothers EGY directly and provide the reference: <strong>${ref}</strong>
    </div>
    <div class="footer">Brothers EGY Car Rental · Document Verification</div>`;
}

verify();
</script>
</body>
</html>
