name: Sync Google Sheets → Firestore

on:
  # Run automatically every 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync'
        required: false
        default: 'Manual trigger'

jobs:
  sync:
    name: Sync Sheets to Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write service account credentials
        # Store the service-account.json content in GitHub Secrets as SERVICE_ACCOUNT_JSON
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Run sync script
        run: node sync-sheets.js

      - name: Cleanup credentials
        if: always()
        run: rm -f service-account.json
