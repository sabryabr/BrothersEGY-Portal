<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #04509D; 
            --accent: #e67e22; 
            --dark-bg: rgba(18, 18, 18, 0.85);
            --glass: rgba(255, 255, 255, 0.1); 
            --blur: blur(15px); 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #000; }

        /* Video Background - Updated to your link */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(0.35); object-fit: cover; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: var(--blur);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: 0.5s ease;
        }
        .login-box {
            background: var(--dark-bg); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15); text-align: center; color: white;
            max-width: 350px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .login-box img { height: 60px; margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.9); font-size: 16px; text-align: center; color: #111;
        }
        .login-box button {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .login-box button:hover { background: var(--accent); }

        /* Dashboard Revealed State */
        #main-portal { display: none; height: 100%; }

        /* Navigation Bar */
        .navbar { 
            position: fixed; top: 0; width: 100%; background: rgba(4, 80, 157, 0.95); 
            backdrop-filter: blur(12px); display: flex; align-items: center; 
            padding: 8px 20px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.4); box-sizing: border-box;
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; font-weight: 800; font-size: 1.1rem; margin-right: 25px; }
        
        .nav-tabs { display: flex; gap: 8px; flex-grow: 1; overflow-x: auto; }
        .tab-btn { 
            background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.15); 
            padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s;
            font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .tab-btn:hover, .tab-btn.active { background: white; color: var(--primary); border-color: white; }

        .nav-controls { display: flex; gap: 10px; margin-left: 10px; }
        .ctrl-btn { background: white; color: var(--primary); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { background: var(--accent); color: white; transform: scale(1.1); }
        .logout-btn { background: #d90429; color: white; }

        /* Home Content Area */
        .home-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .home-screen h1 { font-size: 3rem; font-weight: 900; margin-bottom: 0px; letter-spacing: -1px; }
        .home-screen p { font-size: 1.1rem; opacity: 0.7; margin-top: 10px; font-weight: 400; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; max-width: 950px; width: 90%; margin-top: 40px; }
        .menu-card { 
            background: rgba(30, 30, 30, 0.6); backdrop-filter: var(--blur); padding: 40px 20px; 
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .menu-card:hover { transform: translateY(-12px); background: rgba(30, 30, 30, 0.8); border-color: var(--accent); box-shadow: 0 15px 30px rgba(230, 126, 34, 0.2); }
        .menu-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; display: block; }
        .menu-card h4 { margin: 0; font-size: 1.2rem; font-weight: 700; }

        /* Iframe Display Area */
        #content-frame { width: 100%; height: calc(100% - 55px); margin-top: 55px; border: none; background: white; display: none; }

        @media screen and (max-width: 768px) {
            .nav-tabs { display: none; }
            .home-screen h1 { font-size: 2.2rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://brothersegy.com/wp-content/uploads/2026/03/181537-866999852.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png">
            <h2 style="margin:0;">Executive Hub</h2>
            <p style="opacity: 0.6; font-size: 0.85rem; margin: 8px 0 20px;">Fleet Management System v2.0</p>
            <input type="password" id="pass-field" placeholder="Enter Team Code" onkeypress="handleKey(event)">
            <button onclick="checkPassword()">AUTHORIZE ACCESS</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: bold;">Access Denied. Check Credentials.</p>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <a href="#" class="nav-brand" onclick="showHome()">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="28">
                <span>Brothers EGY</span>
            </a>

            <div class="nav-tabs">
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">
                    <i class="fa-solid fa-calculator"></i> Price Proposal
                </button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)">
                    <i class="fa-solid fa-file-contract"></i> Contract (EN)
                </button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)">
                    <i class="fa-solid fa-file-signature"></i> Contract (AR)
                </button>
            </div>

            <div class="nav-controls">
                <button class="ctrl-btn" title="Dashboard Home" onclick="showHome()"><i class="fa-solid fa-house"></i></button>
                <button class="ctrl-btn logout-btn" title="Secure Logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div id="home" class="home-screen">
            <h1>Executive Dashboard</h1>
            <p>Professional Fleet & Management Solutions</p>
            
            <div class="menu-grid">
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <h4>Price Proposal</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <h4>Contract (EN)</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                    <i class="fa-solid fa-earth-africa"></i>
                    <h4>Contract (AR)</h4>
                </div>
            </div>
        </div>

        <iframe id="content-frame" src=""></iframe>
    </div>

    <script>
        const DASHBOARD_PASS = "Brothers2026"; // Secure Code

        function checkPassword() {
            const input = document.getElementById('pass-field').value;
            if(input === DASHBOARD_PASS) {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'block';
                }, 400);
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-field').value = "";
            }
        }

        function handleKey(e) { if(e.key === "Enter") checkPassword(); }

        function loadFrame(url, btn) {
            document.getElementById('home').style.display = 'none';
            const frame = document.getElementById('content-frame');
            frame.style.display = 'block';
            frame.src = url;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function showHome() {
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('content-frame').src = "";
            document.getElementById('home').style.display = 'flex';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function logout() { 
            if(confirm("Confirm Logout from Management Portal?")) {
                location.reload(); 
            }
        }
    </script>
</body>
</html>
