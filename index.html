<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #04509D; --accent: #e67e22; --glass: rgba(255, 255, 255, 0.1); --blur: blur(15px); }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }

        /* Video Background */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(0.4); object-fit: cover; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: var(--blur);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: 0.5s ease;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; color: white;
            max-width: 350px; width: 90%; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .login-box img { height: 60px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.9); font-size: 16px; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .login-box button:hover { background: var(--accent); }

        /* Hidden Dashboard - revealed after login */
        #main-portal { display: none; height: 100%; }

        /* Navigation Bar */
        .navbar { 
            position: fixed; top: 0; width: 100%; background: rgba(4, 80, 157, 0.9); 
            backdrop-filter: blur(10px); display: flex; align-items: center; 
            padding: 10px 20px; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.3); box-sizing: border-box;
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-weight: bold; margin-right: 30px; }
        .nav-tabs { display: flex; gap: 10px; flex-grow: 1; overflow-x: auto; }
        .tab-btn { 
            background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.2); 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s;
            font-size: 13px; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .tab-btn:hover, .tab-btn.active { background: var(--accent); border-color: var(--accent); }

        .nav-controls { display: flex; gap: 10px; margin-left: 10px; }
        .ctrl-btn { background: white; color: var(--primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* Content Areas */
        #content-frame { width: 100%; height: calc(100% - 55px); margin-top: 55px; border: none; background: white; display: none; }
        .home-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; max-width: 900px; width: 90%; margin-top: 30px; }
        .menu-card { 
            background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); padding: 25px; 
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; cursor: pointer;
        }
        .menu-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.2); border-color: var(--accent); }
        .menu-card i { font-size: 35px; color: var(--accent); margin-bottom: 15px; }

        @media screen and (max-width: 768px) {
            .nav-tabs { display: none; } /* Hide tabs on mobile, use home cards */
            .home-screen h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-luxury-car-parked-in-a-modern-driveway-34503-large.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png">
            <h3>Team Access Only</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Brothers EGY Management System</p>
            <input type="password" id="pass-field" placeholder="Enter Team Password" onkeypress="handleKey(event)">
            <button onclick="checkPassword()">Login to Portal</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; display: none;">Incorrect password. Try again.</p>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <a href="#" class="nav-brand" onclick="showHome()">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="25">
                <span>Brothers EGY</span>
            </a>

            <div class="nav-tabs">
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">
                    <i class="fa-solid fa-calculator"></i> Price Proposal
                </button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)">
                    <i class="fa-solid fa-file-contract"></i> Contract (EN)
                </button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)">
                    <i class="fa-solid fa-file-signature"></i> Contract (AR)
                </button>
            </div>

            <div class="nav-controls">
                <button class="ctrl-btn" title="Home" onclick="showHome()"><i class="fa-solid fa-house"></i></button>
                <button class="ctrl-btn" title="Logout" onclick="logout()" style="background: #ff4d4d; color: white;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div id="home" class="home-screen">
            <h1 style="margin-bottom: 5px;">Executive Dashboard</h1>
            <p style="opacity: 0.8;">Professional Fleet Management Tools</p>
            
            <div class="menu-grid">
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                    <i class="fa-solid fa-calculator"></i>
                    <h4>Price Proposal</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                    <i class="fa-solid fa-file-shield"></i>
                    <h4>Contract (EN)</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                    <i class="fa-solid fa-language"></i>
                    <h4>Contract (AR)</h4>
                </div>
            </div>
        </div>

        <iframe id="content-frame" src=""></iframe>
    </div>

    <script>
        const DASHBOARD_PASS = "Brothers2026"; // CHANGE THIS TO YOUR DESIRED PASSWORD

        function checkPassword() {
            const input = document.getElementById('pass-field').value;
            if(input === DASHBOARD_PASS) {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'block';
                }, 500);
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-field').value = "";
            }
        }

        function handleKey(e) { if(e.key === "Enter") checkPassword(); }

        function loadFrame(url, btn) {
            document.getElementById('home').style.display = 'none';
            const frame = document.getElementById('content-frame');
            frame.style.display = 'block';
            frame.src = url;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function showHome() {
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('home').style.display = 'flex';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
