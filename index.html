<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY - Executive ERP 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #04509D; --success: #50fa7b; --rented: #ff4b4b; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 100; box-sizing: border-box; }
        .tab-btn { background: rgba(255,255,255,0.05); color: #888; border: 1px solid #333; padding: 10px 18px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .tab-btn.active { border-color: var(--success); color: var(--success); }
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        #main-portal { display: none; padding-top: 80px; height: 100vh; flex-direction: column; }
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; padding: 15px; }
        .val { font-size: 20px; font-weight: bold; color: var(--success); }
        .content-area { flex-grow: 1; margin: 0 30px 20px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .car-row { display: flex; align-items: center; height: 40px; border-bottom: 1px solid #111; font-size: 12px; }
        .car-label { width: 180px; color: #aaa; }
        .car-track { flex-grow: 1; height: 18px; background: #111; border-radius: 4px; position: relative; }
        .bar { position: absolute; height: 100%; background: var(--rented); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:40px; margin-bottom:20px;">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">LOGIN</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:30px;">
            <div>
                <button class="tab-btn active" onclick="location.reload()">Fleet Radar</button>
                <button class="tab-btn" onclick="showImporter()">Bulk Import</button>
            </div>
        </nav>

        <div class="metrics-bar">
            <div class="metric-card"><label>Total Fleet</label><div class="val" id="m-fleet">0</div></div>
            <div class="metric-card"><label>Total Rev</label><div class="val" id="m-rev">0 EGP</div></div>
            <div class="metric-card"><label>Total Bookings</label><div class="val" id="m-count">0</div></div>
            <div class="metric-card"><label>System Status</label><div class="val" style="color:var(--success)">Online</div></div>
        </div>

        <div class="content-area" id="main-content">
            <h4 style="color:#555">🗓️ TIMELINE LOADED FROM CLOUD</h4>
            <div id="radar-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            const doc = await db.collection("users").doc(u).get();
            if (doc.exists && doc.data().password === p) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-portal').style.display = 'flex';
                init();
            } else { alert("Denied"); }
        }

        async function init() {
            const fleet = await db.collection("fleet").get();
            const bookings = await db.collection("bookings").get();
            document.getElementById('m-fleet').innerText = fleet.size;
            document.getElementById('m-count').innerText = bookings.size;
            
            let totalRev = 0;
            const grid = document.getElementById('radar-grid');
            grid.innerHTML = "";

            fleet.forEach(carDoc => {
                const car = carDoc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class="car-label">#${carDoc.id} ${car.model || ''}</div><div class="car-track" id="t-${carDoc.id}"></div>`;
                grid.appendChild(row);

                bookings.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == carDoc.id) {
                        totalRev += (parseFloat(b.total) || 0);
                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.left = "10%"; bar.style.width = "20%";
                        document.getElementById(`t-${carDoc.id}`).appendChild(bar);
                    }
                });
            });
            document.getElementById('m-rev').innerText = totalRev.toLocaleString() + " EGP";
        }

        function showImporter() {
            document.getElementById('main-content').innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <h3>Bulk CSV Importer</h3>
                    <input type="file" id="csvFile" accept=".csv">
                    <button onclick="processCSV()" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:5px; margin-top:20px;">UPLOAD & SYNC</button>
                    <div id="status" style="margin-top:20px; color:var(--success)"></div>
                </div>`;
        }

        async function processCSV() {
            const file = document.getElementById('csvFile').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/);
                const headers = lines[0].split(',');
                
                // Smart Index Finder
                const idxNo = headers.indexOf('No.');
                const idxCar = headers.indexOf('كود السيارة');
                const idxDaily = headers.indexOf('سعر السيارة اليومي بالجنيه المصري');
                const idxDays = headers.indexOf('مدة الخدمة يوم');
                const idxPaid = headers.indexOf('المدفوع EGP');

                let count = 0;
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Handles commas inside quotes
                    if (cols[idxNo]) {
                        // Math: (Rate * Days) + Extras
                        const rate = parseFloat(cols[idxDaily]?.replace(/[^\d.]/g, '')) || 0;
                        const days = parseFloat(cols[idxDays]) || 1;
                        const total = rate * days;
                        
                        await db.collection('bookings').doc(cols[idxNo]).set({
                            carId: cols[idxCar],
                            total: total,
                            paid: parseFloat(cols[idxPaid]) || 0,
                            timestamp: Date.now()
                        }, { merge: true });
                        count++;
                        document.getElementById('status').innerText = `Synced ${count} rows...`;
                    }
                }
                alert("Complete!"); location.reload();
            };
            reader.readAsText(file, 'UTF-8');
        }
    </script>
</body>
</html>
