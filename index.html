<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY | Financial Intelligence ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #04509D; --accent: #e67e22; --success: #2ecc71; --danger: #e74c3c; --bg: #05070a; --card: #11141d; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: rgba(10,14,24,0.9); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .m-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .m-card label { color: #666; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .m-card .val { font-size: 24px; font-weight: 800; margin-top: 5px; }

        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 20px; background: rgba(255,255,255,0.02); color: #555; font-size: 12px; }
        td { padding: 15px 20px; border-top: 1px solid var(--border); font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-rented { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        .bg-avail { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .bg-pending { background: rgba(230, 126, 34, 0.1); color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="30" style="margin-bottom:40px; align-self:center;">
        <div class="nav-item active" onclick="loadDashboard()"><i class="fa-solid fa-tower-broadcast"></i> Fleet Radar</div>
        <div class="nav-item" onclick="loadView('bookings')"><i class="fa-solid fa-receipt"></i> Orders & Payments</div>
        <div class="nav-item" onclick="loadView('fleet')"><i class="fa-solid fa-car-side"></i> Master Fleet</div>
        <div class="nav-item" onclick="location.reload()" style="margin-top:auto;"><i class="fa-solid fa-power-off"></i> Logout</div>
    </div>

    <div class="main">
        <div class="metrics-grid">
            <div class="m-card"><label>Currently Rented</label><div class="val" id="met-rented">0</div></div>
            <div class="m-card"><label>Available Now</label><div class="val" id="met-avail" style="color:var(--success)">0</div></div>
            <div class="m-card"><label>Pending Payments</label><div class="val" id="met-pend" style="color:var(--accent)">0 EGP</div></div>
            <div class="m-card"><label>To-Come (Booked)</label><div class="val" id="met-future">0</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead id="t-head"></thead>
                <tbody id="t-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc", projectId: "brothers-egy-portal", appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadDashboard() {
            const body = document.getElementById('t-body');
            const head = document.getElementById('t-head');
            head.innerHTML = '<tr><th>Car ID</th><th>Model</th><th>Plate</th><th>Status</th><th>Current/Next Order</th><th>Action</th></tr>';
            body.innerHTML = '<tr><td colspan="6">Calculating Fleet Status...</td></tr>';

            const carsSnap = await db.collection('fleet').get();
            const bookSnap = await db.collection('bookings').get();
            const now = new Date();
            
            let rentedCount = 0, availCount = 0, futureCount = 0;
            body.innerHTML = '';

            carsSnap.forEach(doc => {
                const c = doc.data();
                // Filter: Only show "Valid" or "Active" under contracting for Radar
                const contractStatus = (c['Contract'] || c['حاله التعاقد'] || "").toLowerCase();
                if (!contractStatus.includes('valid') && !contractStatus.includes('ساري')) return;

                let status = '<span class="badge bg-avail">Available</span>';
                let orderInfo = 'No Active Bookings';
                
                // Check all bookings for this car
                bookSnap.forEach(bDoc => {
                    const b = bDoc.data();
                    if (b['كود السيارة'] == doc.id) {
                        const start = new Date(b['بداية التعاقد']);
                        const end = new Date(b['نهاية التعاقد']);
                        
                        if (now >= start && now <= end) {
                            status = '<span class="badge bg-rented">Rented</span>';
                            orderInfo = `Order #${bDoc.id} - ${b['اسم العميل']}`;
                            rentedCount++;
                        } else if (start > now) {
                            orderInfo = `Upcoming: ${start.toLocaleDateString()}`;
                            futureCount++;
                        }
                    }
                });

                if (status.includes('Available')) availCount++;

                const row = body.insertRow();
                row.innerHTML = `
                    <td><b>#${doc.id}</b></td>
                    <td>${c['Model'] || c['الطراز']}</td>
                    <td>${c['رقم اللوحة']} ${c['احرف اللوحة']}</td>
                    <td>${status}</td>
                    <td>${orderInfo}</td>
                    <td><button onclick="viewDetails('${doc.id}')" style="background:#222; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">View</button></td>
                `;
            });

            document.getElementById('met-rented').innerText = rentedCount;
            document.getElementById('met-avail').innerText = availCount;
            document.getElementById('met-future').innerText = futureCount;
        }

        async function loadView(view) {
            const body = document.getElementById('t-body');
            const head = document.getElementById('t-head');
            body.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

            if (view === 'bookings') {
                head.innerHTML = '<tr><th>ID</th><th>Customer</th><th>Total Cost</th><th>Paid</th><th>Remaining</th><th>Payment Status</th></tr>';
                const snap = await db.collection('bookings').get();
                let totalPend = 0;
                body.innerHTML = '';
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const total = parseFloat(String(d['إجمالي المستحق (Total)']).replace(/[^\d.]/g, '')) || 0;
                    const paid = parseFloat(String(d['المدفوع EGP']).replace(/[^\d.]/g, '')) || 0;
                    const remaining = total - paid;
                    if (remaining > 0) totalPend += remaining;

                    const pStatus = remaining <= 0 ? '<span class="badge bg-avail">Fully Paid</span>' : '<span class="badge bg-pending">Pending</span>';

                    const row = body.insertRow();
                    row.innerHTML = `<td>#${doc.id}</td><td>${d['اسم العميل']}</td><td>${total.toLocaleString()}</td><td>${paid.toLocaleString()}</td><td>${remaining.toLocaleString()}</td><td>${pStatus}</td>`;
                });
                document.getElementById('met-pend').innerText = totalPend.toLocaleString() + " EGP";
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
