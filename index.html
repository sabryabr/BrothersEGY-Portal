<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY - Executive Portal 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #04509D; --success: #50fa7b; --rented: #ff4b4b; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* Video Background - Always visible behind login */
        .video-wrapper { position: fixed; inset: 0; z-index: -1; background: #0a0a0a; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); }

        /* Login Box */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button.login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Navigation & Tabs */
        #main-portal { display: none; flex-direction: column; height: 100vh; padding-top: 70px; }
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        .nav-tabs { display: flex; gap: 10px; }
        .tab-btn { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid transparent; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .tab-btn.active { border-color: var(--success); color: var(--success); }

        /* Dashboard */
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 40px; }
        .metric-card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 15px; }
        .val { font-size: 22px; font-weight: bold; color: var(--success); }

        .timeline-container { flex-grow: 1; margin: 0 40px 20px; background: rgba(0,0,0,0.6); border: 1px solid #333; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .car-row { display: flex; align-items: center; height: 40px; border-bottom: 1px solid #222; }
        .car-label { width: 200px; font-size: 11px; color: #aaa; }
        .car-track { flex-grow: 1; height: 20px; background: #111; border-radius: 4px; position: relative; }
        .booking-bar { position: absolute; height: 100%; background: var(--rented); border-radius: 3px; }

        iframe { display: none; width: 100%; height: calc(100vh - 70px); border: none; }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:40px; margin-bottom:20px;">
            <input type="text" id="user-field" placeholder="Username">
            <input type="password" id="pass-field" placeholder="Password">
            <button class="login-btn" onclick="attemptLogin()">ENTER PORTAL</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:30px; cursor:pointer;" onclick="showHome()">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">Proposal</button>
                <button class="tab-btn" onclick="loadFrame('receipt.html', this)">Receipt</button>
                <button class="tab-btn active" id="home-tab" onclick="showHome()">Fleet Radar</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div id="home-content">
            <div class="metrics-bar">
                <div class="metric-card"><label>Active Rentals</label><div class="val" id="m-active">0</div></div>
                <div class="metric-card"><label>Total Fleet</label><div class="val" id="m-total">0</div></div>
                <div class="metric-card"><label>Cash Flow</label><div class="val" id="m-cash">0</div></div>
                <div class="metric-card"><label>Risk Alerts</label><div class="val" id="m-risk" style="color:orange">0</div></div>
            </div>
            <div class="timeline-container">
                <h4 id="status-msg">🗓️ FLEET RADAR</h4>
                <div id="gantt-grid"></div>
            </div>
        </div>
        <iframe id="content-frame"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function attemptLogin() {
            const u = document.getElementById('user-field').value.toLowerCase().trim();
            const p = document.getElementById('pass-field').value;
            
            try {
                // If this fails, it means your 'users' collection doesn't have the document
                const doc = await db.collection("users").doc(u).get();
                if (doc.exists && doc.data().password === p) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    loadData();
                } else { alert("Access Denied"); }
            } catch (e) { alert("Connection Error: Check Firestore Rules"); }
        }

        async function loadData() {
            const fleetSnap = await db.collection("fleet").get();
            const bookingsSnap = await db.collection("bookings").get();
            
            document.getElementById('m-total').innerText = fleetSnap.size;
            document.getElementById('m-active').innerText = bookingsSnap.size;

            const grid = document.getElementById('gantt-grid');
            grid.innerHTML = "";

            fleetSnap.forEach(doc => {
                const car = doc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class="car-label">#${doc.id} ${car.model || ''}</div><div class="car-track" id="track-${doc.id}"></div>`;
                grid.appendChild(row);

                bookingsSnap.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == doc.id) {
                        const bar = document.createElement('div');
                        bar.className = 'booking-bar';
                        bar.style.left = "10%"; // Placeholder for date logic
                        bar.style.width = "30%";
                        document.getElementById(`track-${doc.id}`).appendChild(bar);
                    }
                });
            });
        }

        function loadFrame(url, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('home-content').style.display = 'none';
            const f = document.getElementById('content-frame');
            f.style.display = 'block'; f.src = url;
        }

        function showHome() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('home-tab').classList.add('active');
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('home-content').style.display = 'block';
        }
    </script>
</body>
</html>
