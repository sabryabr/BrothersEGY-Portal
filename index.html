<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Fusion Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #04509D; --accent: #e67e22; --success: #2ecc71; --danger: #e74c3c;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); }

        /* Login */
        #login-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: rgba(15, 15, 15, 0.9); padding: 50px 40px; border-radius: 25px; border: 1px solid var(--glass-border); text-align: center; max-width: 400px; width: 85%; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: white; color: #333; text-align: center; }
        .login-box button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* Main Structure */
        #main-portal { display: none; height: 100vh; flex-direction: column; }
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(4, 80, 157, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; padding: 10px 30px; z-index: 100; box-sizing: border-box; }
        .nav-tabs { display: flex; gap: 8px; }
        .tab-btn { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; display: none; }
        .tab-btn.active { background: white; color: var(--primary); }

        .content-container { margin-top: 65px; height: calc(100vh - 65px); overflow-y: auto; padding: 20px 30px; box-sizing: border-box; }
        
        /* Dashboard Cards */
        .dashboard-center { text-align: center; padding-top: 40px; }
        .menu-grid { display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .menu-card { background: var(--glass-bg); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; width: 180px; transition: 0.3s; display: none; }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .menu-card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; display: block; }

        /* Tables & Radar */
        .radar-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); }
        .radar-table th { background: rgba(255,255,255,0.05); padding: 15px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; }
        .radar-table td { padding: 15px; border-top: 1px solid var(--glass-border); font-size: 13px; }
        .badge { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .bg-rented { background: rgba(231, 76, 60, 0.2); color: #ff6b6b; }
        .bg-avail { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        
        iframe { width: 100%; height: 100%; border: none; display: none; background: white; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" alt="Brothers Logo">
            <h2 style="margin:0; font-weight:800;">EXECUTIVE HUB</h2>
            <p id="login-status" style="color:#aaa; font-size: 11px; margin-bottom: 20px;">FIREBASE SECURED ACCESS</p>
            <input type="text" id="user-field" placeholder="Username">
            <input type="password" id="pass-field" placeholder="Password">
            <button onclick="attemptLogin()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <div onclick="showHome()" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="30">
                <span style="font-weight: 800; letter-spacing: 1px; font-size: 14px;">BROTHERS EGY</span>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn access-radar" onclick="showRadar(this)">Fleet Radar</button>
                <button class="tab-btn access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">Proposal</button>
                <button class="tab-btn access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)">EN Contract</button>
                <button class="tab-btn access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)">AR Contract</button>
                <button class="tab-btn access-rec" onclick="loadFrame('receipt.html', this)">Receipt</button>
            </div>
            <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div class="content-container" id="main-scroll">
            <div id="home-content" class="dashboard-center">
                <h1 style="letter-spacing:-2px;">Executive Dashboard</h1>
                <p style="opacity: 0.6; font-size: 13px;">System Live | Role: <span id="display-role" style="color:var(--accent); font-weight:bold;">-</span></p>
                <div class="menu-grid">
                    <div class="menu-card access-radar" onclick="showRadar()">
                        <i class="fa-solid fa-tower-broadcast"></i><h4>Fleet Radar</h4>
                    </div>
                    <div class="menu-card access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                        <i class="fa-solid fa-file-invoice-dollar"></i><h4>Proposal</h4>
                    </div>
                    <div class="menu-card access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                        <i class="fa-solid fa-shield-halved"></i><h4>EN Contract</h4>
                    </div>
                    <div class="menu-card access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                        <i class="fa-solid fa-file-signature"></i><h4>AR Contract</h4>
                    </div>
                </div>
            </div>

            <div id="radar-content" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>Fleet Status Radar</h2>
                    <div id="radar-stats" style="font-size:12px; color:#aaa;"></div>
                </div>
                <table class="radar-table">
                    <thead>
                        <tr>
                            <th>Car Details</th>
                            <th>Plate Number</th>
                            <th>Status</th>
                            <th>Current Booking</th>
                            <th>Finances</th>
                        </tr>
                    </thead>
                    <tbody id="radar-body"></tbody>
                </table>
            </div>
            <iframe id="content-frame" src=""></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function attemptLogin() {
            const user = document.getElementById('user-field').value.toLowerCase();
            const pass = document.getElementById('pass-field').value;
            const status = document.getElementById('login-status');
            try {
                const userDoc = await db.collection("users").doc(user).get();
                if (userDoc.exists && userDoc.data().password === pass) {
                    const data = userDoc.data();
                    applyPermissions(data.access);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    document.getElementById('display-role').innerText = data.role || "Executive";
                } else { alert("Access Denied"); }
            } catch (err) { status.innerText = "Error: " + err.message; }
        }

        function applyPermissions(accessArray) {
            const map = {1:'.access-quote', 2:'.access-en', 3:'.access-ar', 4:'.access-rec', 5:'.access-radar'};
            accessArray.forEach(code => {
                if(map[code]) document.querySelectorAll(map[code]).forEach(el => el.style.display = 'block');
            });
        }

        async function showRadar(btn) {
            hideAll();
            document.getElementById('radar-content').style.display = 'block';
            if(btn) setActiveTab(btn);
            
            const body = document.getElementById('radar-body');
            body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Scanning Fleet Data...</td></tr>';

            const cars = await db.collection('fleet').get();
            const bookings = await db.collection('bookings').get();
            const now = new Date();
            body.innerHTML = '';

            cars.forEach(doc => {
                const c = doc.data();
                // ONLY SHOW VALID CONTRACTS
                const contract = (c['Contract'] || c['حاله التعاقد'] || "").toLowerCase();
                if(!contract.includes('valid') && !contract.includes('ساري')) return;

                // COMBINE PLATE Logic (AC to Z numbers, Y to W letters)
                const pNum = c['رقم اللوحة'] || "";
                const pLet = c['احرف اللوحة'] || "";
                const fullPlate = `${pNum} ${pLet}`.trim();

                let status = '<span class="badge bg-avail">AVAILABLE</span>';
                let bookingInfo = 'No Active Rentals';
                let financeBadge = '<span class="badge" style="background:#333;">N/A</span>';

                bookings.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b['كود السيارة'] == doc.id) {
                        const start = new Date(b['بداية التعاقد']);
                        const end = new Date(b['نهاية التعاقد']);
                        
                        // AUTO-MARK OLD BOOKINGS AS PAID/COMPLETED
                        const isOld = start.getFullYear() < 2026;
                        
                        if (now >= start && now <= end && !isOld) {
                            status = '<span class="badge bg-rented">RENTED</span>';
                            bookingInfo = `<b>${b['اسم العميل']}</b><br><small>Ends: ${b['نهاية التعاقد']}</small>`;
                        }

                        if(isOld) {
                            financeBadge = '<span class="badge bg-avail">PAID (HIST)</span>';
                        } else {
                            const paid = parseFloat(b['المدفوع EGP']) || 0;
                            const total = parseFloat(b['إجمالي المستحق (Total)']) || 0;
                            financeBadge = (paid >= total) ? '<span class="badge bg-avail">PAID</span>' : '<span class="badge bg-pending">PENDING</span>';
                        }
                    }
                });

                const row = body.insertRow();
                row.innerHTML = `
                    <td>
                        <div style="font-weight:bold;">#${doc.id} ${c['Type'] || c['النوع']}</div>
                        <div style="font-size:11px; color:#888;">${c['Model'] || c['الطراز']} | ${c['Color'] || c['اللون']} | ${c['سنة الصنع'] || ''}</div>
                    </td>
                    <td style="font-family:monospace; letter-spacing:1px;">${fullPlate}</td>
                    <td>${status}</td>
                    <td>${bookingInfo}</td>
                    <td>${financeBadge}</td>
                `;
            });
        }

        function loadFrame(url, btn) {
            hideAll();
            const f = document.getElementById('content-frame');
            f.style.display = 'block'; f.src = url;
            if(btn) setActiveTab(btn);
        }

        function showHome() {
            hideAll();
            document.getElementById('home-content').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function hideAll() {
            ['home-content', 'radar-content', 'content-frame'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function setActiveTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
