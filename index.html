<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Fusion Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #04509D; --accent: #e67e22; --success: #2ecc71; --danger: #e74c3c;
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        /* Video Background */
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35); }

        /* Centered Login */
        #login-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: rgba(15, 15, 15, 0.9); padding: 50px 40px; border-radius: 30px; border: 1px solid var(--glass-border); text-align: center; max-width: 380px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .login-box img { height: 70px; margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: white; color: #333; text-align: center; font-weight: 600; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #0560bd; }

        /* Layout Structure */
        #main-portal { display: none; height: 100vh; flex-direction: column; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; padding: 12px 30px; z-index: 100; box-sizing: border-box; }
        
        .nav-tabs { display: flex; gap: 10px; }
        .tab-btn { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); padding: 9px 16px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; display: none; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { background: white; color: var(--primary); }

        .content-container { margin-top: 70px; height: calc(100vh - 70px); overflow-y: auto; padding: 30px; box-sizing: border-box; }
        
        /* Dashboard Cards */
        .dashboard-center { text-align: center; padding-top: 5vh; }
        .menu-grid { display: flex; gap: 25px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
        .menu-card { background: var(--glass-bg); backdrop-filter: blur(15px); padding: 40px 30px; border-radius: 25px; border: 1px solid var(--glass-border); cursor: pointer; width: 210px; transition: 0.4s; display: none; text-align: center; }
        .menu-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .menu-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; display: block; }

        /* Fleet Radar Table */
        .radar-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        .radar-table th { padding: 15px; text-align: left; font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .radar-table tr td { background: rgba(20, 20, 20, 0.6); padding: 18px 15px; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); }
        .radar-table tr td:first-child { border-left: 1px solid var(--glass-border); border-top-left-radius: 15px; border-bottom-left-radius: 15px; }
        .radar-table tr td:last-child { border-right: 1px solid var(--glass-border); border-top-right-radius: 15px; border-bottom-right-radius: 15px; }
        
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .bg-rented { background: rgba(231, 76, 60, 0.2); color: #ff6b6b; border: 1px solid rgba(231,76,60,0.3); }
        .bg-avail { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        
        iframe { width: 100%; height: 100%; border: none; display: none; border-radius: 20px; background: white; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" alt="Brothers Logo">
            <h2 style="margin:0; font-weight:800; letter-spacing:-1px;">EXECUTIVE HUB</h2>
            <p id="login-status" style="color:#666; font-size: 11px; margin-bottom: 25px;">SECURE FIREBASE AUTHENTICATION</p>
            <input type="text" id="user-field" placeholder="Username" autocomplete="off">
            <input type="password" id="pass-field" placeholder="Password">
            <button onclick="attemptLogin()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <div onclick="showHome()" style="cursor: pointer; display: flex; align-items: center; gap: 12px;">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="32">
                <span style="font-weight: 800; letter-spacing: 1px; font-size: 15px;">BROTHERS EGY</span>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn access-radar" onclick="showRadar(this)">Fleet Radar</button>
                <button class="tab-btn access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">Proposal</button>
                <button class="tab-btn access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)">EN Contract</button>
                <button class="tab-btn access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)">AR Contract</button>
                <button class="tab-btn access-rec" onclick="loadFrame('receipt.html', this)">Digital Receipt</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="showHome()" style="background:var(--glass-bg); color:white; border:1px solid var(--glass-border); padding:8px 12px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-house"></i></button>
                <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div class="content-container" id="main-scroll">
            <div id="home-content" class="dashboard-center">
                <h1 style="font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -3px;">Executive Dashboard</h1>
                <p style="opacity: 0.5; font-size: 14px; margin-top: 5px;">Welcome back, <span id="display-role" style="color:var(--accent); font-weight:bold;">Executive</span></p>
                <div class="menu-grid">
                    <div class="menu-card access-radar" onclick="showRadar()">
                        <i class="fa-solid fa-tower-broadcast"></i><h4>Fleet Radar</h4>
                    </div>
                    <div class="menu-card access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                        <i class="fa-solid fa-file-invoice-dollar"></i><h4>Proposal</h4>
                    </div>
                    <div class="menu-card access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                        <i class="fa-solid fa-shield-halved"></i><h4>EN Contract</h4>
                    </div>
                    <div class="menu-card access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                        <i class="fa-solid fa-file-signature"></i><h4>AR Contract</h4>
                    </div>
                </div>
            </div>

            <div id="radar-content" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px;">
                    <div>
                        <h2 style="margin:0; font-size: 24px;">Fleet Operations Radar</h2>
                        <p style="color:#666; font-size:12px; margin:0;">Real-time tracking of active contracting fleet</p>
                    </div>
                    <div id="radar-stats" style="text-align:right; font-size:12px; font-weight:bold; color:var(--success);"></div>
                </div>
                <table class="radar-table">
                    <thead>
                        <tr>
                            <th>Vehicle Specs</th>
                            <th>Plate Identity</th>
                            <th>Status</th>
                            <th>Current Booking</th>
                            <th>Accounting</th>
                        </tr>
                    </thead>
                    <tbody id="radar-body"></tbody>
                </table>
            </div>

            <iframe id="content-frame" src=""></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Login with Enter Key
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter' && document.getElementById('login-overlay').style.display !== 'none') attemptLogin(); });

        async function attemptLogin() {
            const user = document.getElementById('user-field').value.toLowerCase().trim();
            const pass = document.getElementById('pass-field').value;
            const status = document.getElementById('login-status');
            if(!user || !pass) return;
            try {
                const userDoc = await db.collection("users").doc(user).get();
                if (userDoc.exists && userDoc.data().password === pass) {
                    const data = userDoc.data();
                    applyPermissions(data.access);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    document.getElementById('display-role').innerText = data.role || "Executive";
                } else { throw new Error("Credentials Invalid"); }
            } catch (err) { status.innerText = "ACCESS DENIED"; status.style.color = "var(--danger)"; }
        }

        function applyPermissions(accessArray) {
            const map = {1:'.access-quote', 2:'.access-en', 3:'.access-ar', 4:'.access-rec', 5:'.access-radar'};
            Object.keys(map).forEach(key => {
                if(accessArray.includes(parseInt(key))) document.querySelectorAll(map[key]).forEach(el => el.style.display = 'block');
            });
        }

        async function showRadar(btn) {
            hideAll();
            document.getElementById('radar-content').style.display = 'block';
            if(btn) setActiveTab(btn);
            
            const body = document.getElementById('radar-body');
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; opacity:0.5;">Analyzing Satellite Fleet Data...</td></tr>';

            const cars = await db.collection('fleet').get();
            const bookings = await db.collection('bookings').get();
            const now = new Date();
            let activeCount = 0;
            body.innerHTML = '';

            cars.forEach(doc => {
                const c = doc.data();
                const contract = (c['Contract'] || c['حاله التعاقد'] || "").toLowerCase();
                if(!contract.includes('valid') && !contract.includes('ساري')) return;
                activeCount++;

                // Plate Construction: Spaced Numbers and Spaced Letters
                const pNum = c['رقم اللوحة'] || "";
                const pLet = c['احرف اللوحة'] || "";
                const plateDisplay = `<span style="font-size:18px; font-weight:800; color:white;">${pNum}</span> <span style="color:var(--accent); font-weight:400; margin-left:10px;">${pLet}</span>`;

                let status = '<span class="badge bg-avail">AVAILABLE</span>';
                let bookingInfo = '<span style="opacity:0.3">Idle</span>';
                let financeBadge = '<span class="badge" style="background:#333;">NO RECORD</span>';

                bookings.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b['كود السيارة'] == doc.id) {
                        const startStr = b['بداية التعاقد'] || "";
                        const endStr = b['نهاية التعاقد'] || "";
                        const start = new Date(startStr);
                        const end = new Date(endStr);
                        
                        // History Rule: Mark all before Jan 2026 as PAID/COMPLETED
                        const isLegacy = start.getFullYear() < 2026;
                        
                        if (now >= start && now <= end && !isLegacy) {
                            status = '<span class="badge bg-rented">RENTED</span>';
                            bookingInfo = `<div style="font-weight:bold;">${b['اسم العميل']}</div><div style="font-size:10px; color:#888;">Exp: ${endStr.split(' ')[0]}</div>`;
                        }

                        if(isLegacy) {
                            financeBadge = '<span class="badge" style="border:1px solid #2ecc71; color:#2ecc71;">LEGACY PAID</span>';
                        } else {
                            const paid = parseFloat(String(b['المدفوع EGP']).replace(/[^0-9.-]+/g,"")) || 0;
                            const total = parseFloat(String(b['إجمالي المستحق (Total)']).replace(/[^0-9.-]+/g,"")) || 0;
                            if(paid >= total) financeBadge = '<span class="badge bg-avail">CLEAR</span>';
                            else financeBadge = '<span class="badge bg-pending" style="color:var(--accent); border:1px solid var(--accent);">PENDING</span>';
                        }
                    }
                });

                const row = body.insertRow();
                row.innerHTML = `
                    <td>
                        <div style="font-weight:800; font-size:14px;">${c['Type'] || ''} ${c['Model'] || ''}</div>
                        <div style="font-size:10px; color:#666; text-transform:uppercase;">${c['Color'] || ''} • ${c['سنة الصنع'] || ''} • ID #${doc.id}</div>
                    </td>
                    <td>${plateDisplay}</td>
                    <td>${status}</td>
                    <td>${bookingInfo}</td>
                    <td>${financeBadge}</td>
                `;
            });
            document.getElementById('radar-stats').innerText = `LIVE CONTRACTS: ${activeCount}`;
        }

        function loadFrame(url, btn) {
            hideAll();
            const f = document.getElementById('content-frame');
            f.style.display = 'block'; f.src = url;
            if(btn) setActiveTab(btn);
        }

        function showHome() {
            hideAll();
            document.getElementById('home-content').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function hideAll() {
            ['home-content', 'radar-content', 'content-frame'].forEach(id => document.getElementById(id).style.display = 'none');
        }

        function setActiveTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
