<script>
    // These IDs are pulled directly from your "Publish" screenshots
    const FLEET_SHEET_ID = "1tQVkPj7tCnrKsHEIs04a1WzzC04jpOWuLsXgXOkVMkk";
    const ORDER_SHEET_ID = "1T6j2xnRBTY31crQcJHioKurs4Rvaj-VlEQkm6joGxGM";

    firebase.initializeApp({
        apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
        projectId: "brothers-egy-portal"
    });
    const db = firebase.firestore();

    async function attemptLogin() {
        const user = document.getElementById('user-field').value.toLowerCase();
        const pass = document.getElementById('pass-field').value;
        const doc = await db.collection("users").doc(user).get();
        if (doc.exists && doc.data().password === pass) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-portal').style.display = 'flex';
            fetchPublicData();
        } else { alert("Login Failed"); }
    }

    async function fetchPublicData() {
        const ganttContainer = document.getElementById('gantt-grid');
        ganttContainer.innerHTML = "<p style='padding:20px; color:var(--accent)'>📡 Syncing with Google Sheets...</p>";

        try {
            // Fetching via the Visualization API (Fastest way for Published Sheets)
            const fleetUrl = `https://docs.google.com/spreadsheets/d/${FLEET_SHEET_ID}/gviz/tq?tqx=out:json`;
            const orderUrl = `https://docs.google.com/spreadsheets/d/${ORDER_SHEET_ID}/gviz/tq?tqx=out:json`;

            const [fleetRes, orderRes] = await Promise.all([fetch(fleetUrl), fetch(orderUrl)]);
            const fleetTxt = await fleetRes.text();
            const orderTxt = await orderRes.text();

            // Clean up Google's JSON wrapper
            const fleetData = JSON.parse(fleetTxt.substring(47, fleetTxt.length - 2)).table.rows;
            const orderData = JSON.parse(orderTxt.substring(47, orderTxt.length - 2)).table.rows;

            renderGantt(orderData, fleetData);
        } catch (e) {
            ganttContainer.innerHTML = "<p style='color:red; padding:20px;'>❌ Connection Error. Check 'Publish to Web' settings.</p>";
            console.error(e);
        }
    }

    function renderGantt(orders, fleet) {
        const grid = document.getElementById('gantt-grid');
        grid.innerHTML = "";
        let active = 0;
        const today = new Date();

        fleet.forEach((row, index) => {
            if (index === 0) return; // Skip headers
            const carId = row.c[0]?.v; // Col A
            if (!carId) return;

            const carName = `${row.c[1]?.v || ''} ${row.c[4]?.v || ''} (${row.c[7]?.v || ''})`;
            const carRow = document.createElement('div');
            carRow.className = 'car-row';
            carRow.innerHTML = `<div class="car-label">#${carId} ${carName}</div><div class="car-track" id="track-${carId}"></div>`;
            grid.appendChild(carRow);

            orders.forEach(ord => {
                if (ord.c[3]?.v != carId) return; // Matches Col D in Orders

                // Parse Dates from your Specific Columns (L and T)
                const startStr = ord.c[11]?.f || ord.c[11]?.v;
                const endStr = ord.c[19]?.f || ord.c[19]?.v;
                const s = new Date(startStr);
                const e = new Date(endStr);

                if (!isNaN(s) && !isNaN(e)) {
                    if (s <= today && e >= today) active++;

                    const startPos = (s.getDate() / 31) * 100;
                    const duration = ((e - s) / (1000 * 60 * 60 * 24 * 31)) * 100;

                    const bar = document.createElement('div');
                    bar.className = 'booking-bar';
                    bar.style.left = `${startPos}%`;
                    bar.style.width = `${Math.max(duration, 3)}%`; // Guarantee visible bar
                    document.getElementById(`track-${carId}`).appendChild(bar);
                }
            });
        });

        document.getElementById('count-active').innerText = active;
        document.getElementById('count-ready').innerText = (fleet.length - 1) - active;
    }

    function loadFrame(url) {
        document.getElementById('home-content').style.display = 'none';
        const f = document.getElementById('content-frame');
        f.style.display = 'block'; f.src = url;
    }

    function showHome() {
        document.getElementById('content-frame').style.display = 'none';
        document.getElementById('home-content').style.display = 'block';
    }
</script>
