<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive ERP 3.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #04509D; --rented: #ff4b4b; --success: #50fa7b; --accent: #e67e22; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', 'Cairo', sans-serif; height: 100vh; overflow: hidden; }
        
        .video-wrapper { position: fixed; inset: 0; z-index: -1; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.25); }

        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        .nav-tabs { display: flex; gap: 10px; }
        .tab-btn { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { border-color: var(--success); color: var(--success); background: rgba(80, 250, 123, 0.05); }

        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 45px; border-radius: 24px; border: 1px solid #333; text-align: center; width: 340px; }
        input { display: block; width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

        #main-portal { display: none; flex-direction: column; height: 100vh; padding-top: 70px; }
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 25px 40px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 16px; padding: 20px; }
        .metric-card label { font-size: 10px; color: #666; text-transform: uppercase; }
        .metric-card .val { font-size: 24px; font-weight: 800; color: var(--success); margin-top: 5px; }

        .content-area { flex-grow: 1; margin: 0 40px 30px; background: rgba(0,0,0,0.4); border: 1px solid #222; border-radius: 20px; padding: 25px; overflow-y: auto; }
        
        /* Uploader Styling */
        .uploader-zone { background: rgba(4, 80, 157, 0.1); border: 2px dashed var(--primary); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }

        .car-row { display: flex; align-items: center; height: 50px; border-bottom: 1px solid #1a1a1a; }
        .car-info { width: 220px; font-size: 12px; color: #ddd; }
        .car-track { flex-grow: 1; height: 24px; background: #0f0f0f; border-radius: 6px; position: relative; }
        .bar { position: absolute; height: 100%; background: var(--rented); border-radius: 4px; opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #555; padding: 12px; border-bottom: 2px solid #222; font-size: 12px; }
        td { padding: 15px 12px; border-bottom: 1px solid #111; font-size: 13px; }
        
        iframe { display: none; width: 100%; height: calc(100vh - 70px); border: none; }
    </style>
</head>
<body>
    <div class="video-wrapper"><video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:50px; margin-bottom:30px;">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="login-btn" onclick="login()">SECURE LOGIN</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:35px; cursor:pointer;" onclick="location.reload()">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="showRadar(this)">Fleet Radar</button>
                <button class="tab-btn" onclick="showSettlements(this)">Owner Payouts</button>
                <button class="tab-btn" onclick="showUploader(this)">Bulk Import</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#555; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div id="dashboard-view">
            <div class="metrics-bar">
                <div class="metric-card"><label>Active Units</label><div class="val" id="m-active">0</div></div>
                <div class="metric-card"><label>Total Fleet</label><div class="val" id="m-fleet">0</div></div>
                <div class="metric-card"><label>Revenue (Calculated)</label><div class="val" id="m-rev">0 EGP</div></div>
                <div class="metric-card"><label>Balances</label><div class="val" id="m-bal" style="color:var(--accent)">0 EGP</div></div>
            </div>
            <div class="content-area" id="main-content"></div>
        </div>
        <iframe id="content-frame"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            try {
                const doc = await db.collection("users").doc(u).get();
                if (doc.exists && doc.data().password === p) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    initPortal();
                } else { alert("Login Failed"); }
            } catch (e) { alert("Check Firebase Firestore Rules"); }
        }

        async function initPortal() {
            window.fleetSnap = await db.collection("fleet").get();
            window.bookingSnap = await db.collection("bookings").get();
            renderRadar();
        }

        function renderRadar() {
            const content = document.getElementById('main-content');
            content.innerHTML = `<h4 style="font-size:11px; color:#555;">🗓️ FLEET RADAR TIMELINE</h4>`;
            
            let rev = 0, bal = 0;

            window.fleetSnap.forEach(doc => {
                const car = doc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class="car-info">#${doc.id} ${car.model || 'Unit'}</div><div class="car-track" id="tr-${doc.id}"></div>`;
                content.appendChild(row);

                window.bookingSnap.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == doc.id) {
                        rev += (parseFloat(b.dailyRate) * parseFloat(b.days)) || 0;
                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.left = "10%"; bar.style.width = "20%";
                        document.getElementById(`tr-${doc.id}`).appendChild(bar);
                    }
                });
            });

            document.getElementById('m-fleet').innerText = window.fleetSnap.size;
            document.getElementById('m-rev').innerText = rev.toLocaleString() + " EGP";
        }

        function showUploader(btn) {
            switchTab(btn);
            document.getElementById('main-content').innerHTML = `
                <div class="uploader-zone">
                    <h3>Emergency CSV Importer</h3>
                    <p>Select your 'تسجيل الطلبات' CSV file to update the database via phone.</p>
                    <input type="file" id="csvFile" accept=".csv" style="margin:20px auto;">
                    <button class="login-btn" onclick="processUpload()">START PUMPING</button>
                    <div id="up-status" style="margin-top:15px; font-size:12px; color:var(--success)"></div>
                </div>`;
        }

        async function processUpload() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files[0]) return alert("Select a file first");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n').slice(1);
                const status = document.getElementById('up-status');
                
                for (let line of lines) {
                    const cols = line.split(',');
                    if (cols[0]) {
                        status.innerText = `Importing Row #${cols[0]}...`;
                        await db.collection('bookings').doc(cols[0]).set({
                            carId: cols[3],
                            client: cols[2],
                            start: cols[11],
                            end: cols[19],
                            dailyRate: parseFloat(cols[23]) || 0,
                            days: parseFloat(cols[24]) || 1
                        }, { merge: true });
                    }
                }
                alert("Bulk Import Complete!");
                location.reload();
            };
            reader.readAsText(fileInput.files[0]);
        }

        function showSettlements(btn) {
            switchTab(btn);
            const content = document.getElementById('main-content');
            content.innerHTML = `<h3>💰 Owner Payout Logic</h3><table><thead><tr><th>Vehicle</th><th>Monthly (CJ)</th><th>Net Payout</th></tr></thead><tbody id="p-list"></tbody></table>`;
            
            window.fleetSnap.forEach(doc => {
                const car = doc.data();
                if (car.basePayment) {
                    const net = car.basePayment - (car.basePayment * (car.commissionPct / 100));
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>#${doc.id} ${car.model}</td><td>${car.basePayment}</td><td style="color:var(--success)">${net.toLocaleString()} EGP</td>`;
                    document.getElementById('p-list').appendChild(tr);
                }
            });
        }

        function switchTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('content-frame').style.display = 'none';
        }

        function showRadar(btn) { switchTab(btn); renderRadar(); }
    </script>
</body>
</html>
