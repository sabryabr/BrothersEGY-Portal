<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY - Executive ERP 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #04509D; --success: #50fa7b; --rented: #ff4b4b; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 100; box-sizing: border-box; }
        .tab-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left:10px; }
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        #main-portal { display: none; padding-top: 80px; height: 100vh; flex-direction: column; }
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; padding: 15px; }
        .val { font-size: 20px; font-weight: bold; color: var(--success); }
        .content-area { flex-grow: 1; margin: 0 30px 20px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .car-row { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #111; }
        .car-label { width: 180px; font-size: 11px; color: #888; }
        .car-track { flex-grow: 1; height: 20px; background: #0a0a0a; border-radius: 4px; position: relative; }
        .bar { position: absolute; height: 100%; background: var(--rented); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:45px; margin-bottom:20px;">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SIGN IN</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:32px;">
            <div>
                <button class="tab-btn" onclick="location.reload()">Radar</button>
                <button class="tab-btn" onclick="showImporter()">Import</button>
            </div>
        </nav>
        <div class="metrics-bar">
            <div class="metric-card"><label>Fleet</label><div class="val" id="m-fleet">0</div></div>
            <div class="metric-card"><label>Orders</label><div class="val" id="m-count">0</div></div>
            <div class="metric-card"><label>Total Rev</label><div class="val" id="m-rev">0</div></div>
            <div class="metric-card"><label>Status</label><div class="val" style="color:var(--success)">Live</div></div>
        </div>
        <div class="content-area" id="main-content"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            try {
                const doc = await db.collection("users").doc(u).get();
                if (doc.exists && doc.data().password === p) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    startApp(); // Synced Name
                } else { alert("Invalid login"); }
            } catch (e) { alert("Database Error. Check Rules."); }
        }

        async function startApp() {
            const fleet = await db.collection("fleet").get();
            const bookings = await db.collection("bookings").get();
            document.getElementById('m-fleet').innerText = fleet.size;
            document.getElementById('m-count').innerText = bookings.size;
            
            const grid = document.getElementById('main-content');
            grid.innerHTML = "<h4>🗓️ FLEET RADAR</h4><div id='r-grid'></div>";
            
            let revenue = 0;
            fleet.forEach(carDoc => {
                const car = carDoc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class='car-label'>#${carDoc.id} ${car.model || ''}</div><div class='car-track' id='t-${carDoc.id}'></div>`;
                document.getElementById('r-grid').appendChild(row);

                bookings.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == carDoc.id) {
                        revenue += (parseFloat(b.total) || 0);
                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.left = "15%"; bar.style.width = "20%";
                        document.getElementById(`t-${carDoc.id}`).appendChild(bar);
                    }
                });
            });
            document.getElementById('m-rev').innerText = revenue.toLocaleString() + " EGP";
        }

        function showImporter() {
            document.getElementById('main-content').innerHTML = `
                <div style="padding:30px; text-align:center; border:1px dashed #444;">
                    <h3>Sync CSV Data</h3>
                    <input type="file" id="csvFile" accept=".csv" style="margin:20px 0;">
                    <br>
                    <button id="sync-btn" onclick="handleCSV()" style="padding:15px 30px; background:var(--primary); color:white; border:none; cursor:pointer; font-weight:bold;">START SYNC</button>
                    <div id="status" style="margin-top:20px; font-weight:bold; color:var(--success)"></div>
                </div>`;
        }

        async function handleCSV() {
            const btn = document.getElementById('sync-btn');
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Select CSV file!");
            
            btn.innerText = "UPDATING...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const findIdx = (k) => headers.findIndex(h => k.some(x => h.includes(x)));
                const idxNo = findIdx(['No', 'مسلسل']);
                const idxCar = findIdx(['كود السيارة', 'Car ID']);
                const idxRate = findIdx(['سعر السيارة اليومي', 'Rate']);
                const idxDays = findIdx(['مدة الخدمة يوم', 'Days']);

                let count = 0;
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
                    if (cols[idxNo]) {
                        const rate = parseFloat(cols[idxRate]?.replace(/[^\d.]/g, '')) || 0;
                        const days = parseFloat(cols[idxDays]) || 1;
                        await db.collection('bookings').doc(cols[idxNo]).set({
                            carId: cols[idxCar],
                            total: (rate * days),
                            timestamp: Date.now()
                        }, { merge: true });
                        count++;
                        document.getElementById('status').innerText = `Syncing Row #${cols[idxNo]}...`;
                    }
                }
                alert("Database Refreshed!"); location.reload();
            };
            reader.readAsText(file, 'UTF-8');
        }
    </script>
</body>
</html>
