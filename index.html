<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #04509D; 
            --accent: #e67e22; 
            --glass: rgba(255, 255, 255, 0.05); 
            --blur: blur(25px); 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #000; color: white; overflow: hidden; }

        /* Video Container Fix */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000; /* Fallback color */
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5); /* Makes text pop over video */
        }

        /* Login Overlay matched to */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: var(--blur);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .login-box {
            background: rgba(25, 25, 25, 0.4); padding: 50px 40px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
            max-width: 380px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-box img { height: 70px; margin-bottom: 25px; }
        .login-box h2 { font-weight: 900; letter-spacing: -1px; margin: 0 0 10px; font-size: 1.8rem; }
        .login-box p { opacity: 0.6; font-size: 0.85rem; margin-bottom: 30px; }
        
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none;
            background: #e1e1e1; font-size: 1rem; text-align: center; box-sizing: border-box; color: #111;
        }
        .login-box button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .login-box button:hover { background: #0566c9; }

        /* Dashboard matched to */
        #main-portal { display: none; height: 100%; background: transparent; }

        .navbar { 
            position: fixed; top: 0; width: 100%; background: rgba(4, 80, 157, 0.85); 
            backdrop-filter: blur(10px); display: flex; align-items: center; 
            padding: 10px 25px; z-index: 100; box-sizing: border-box;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; color: white; text-decoration: none; font-weight: 900; margin-right: 40px; }
        .nav-tabs { display: flex; gap: 12px; flex-grow: 1; }
        .tab-btn { 
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: 0.3s;
            font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: 500;
        }
        .tab-btn:hover, .tab-btn.active { background: white; color: var(--primary); }

        .nav-controls { display: flex; gap: 12px; }
        .ctrl-btn { background: white; color: var(--primary); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; }
        .logout-btn { background: #ff4d4d; color: white; }

        .home-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .home-screen h1 { font-size: 4rem; font-weight: 900; margin: 0; letter-spacing: -2px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .home-screen p { font-size: 1.1rem; opacity: 0.8; margin-top: 15px; font-weight: 400; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .menu-grid { display: flex; justify-content: center; gap: 25px; margin-top: 50px; flex-wrap: wrap; }
        .menu-card { 
            background: rgba(20, 20, 20, 0.5); backdrop-filter: var(--blur); padding: 45px 30px; 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; cursor: pointer;
            width: 240px; box-sizing: border-box;
        }
        .menu-card:hover { transform: translateY(-15px); background: rgba(30, 30, 30, 0.7); border-color: var(--accent); }
        .menu-card i { font-size: 3rem; color: var(--accent); margin-bottom: 25px; display: block; }
        .menu-card h4 { margin: 0; font-size: 1.3rem; font-weight: 700; }

        #content-frame { width: 100%; height: calc(100% - 58px); margin-top: 58px; border: none; background: white; display: none; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" alt="Brothers Logo">
            <h2>Executive Hub</h2>
            <p>Fleet Management System v2.0</p>
            <input type="password" id="pass-field" placeholder="Enter Team Code" onkeypress="handleKey(event)">
            <button onclick="checkPassword()">Authorize Access</button>
            <p id="error-msg" style="color: #ff4d4d; margin-top: 15px; display: none; font-weight: bold;">Unauthorized Access.</p>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <a href="#" class="nav-brand" onclick="showHome()">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="30">
                <span>Brothers EGY</span>
            </a>
            <div class="nav-tabs">
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)"><i class="fa-solid fa-calculator"></i> Price Proposal</button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)"><i class="fa-solid fa-file-contract"></i> Contract (EN)</button>
                <button class="tab-btn" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)"><i class="fa-solid fa-file-signature"></i> Contract (AR)</button>
            </div>
            <div class="nav-controls">
                <button class="ctrl-btn" title="Home" onclick="showHome()"><i class="fa-solid fa-house"></i></button>
                <button class="ctrl-btn logout-btn" title="Logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div id="home" class="home-screen">
            <h1>Executive Dashboard</h1>
            <p>Professional Fleet & Management Solutions</p>
            <div class="menu-grid">
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <h4>Price Proposal</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <h4>Contract (EN)</h4>
                </div>
                <div class="menu-card" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                    <i class="fa-solid fa-earth-africa"></i>
                    <h4>Contract (AR)</h4>
                </div>
            </div>
        </div>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <script>
        const PASS = "Brothers2026"; 

        function checkPassword() {
            if(document.getElementById('pass-field').value === PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-portal').style.display = 'block';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-field').value = "";
            }
        }

        function handleKey(e) { if(e.key === "Enter") checkPassword(); }

        function loadFrame(url, btn) {
            document.getElementById('home').style.display = 'none';
            const f = document.getElementById('content-frame');
            f.style.display = 'block';
            f.src = url;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        function showHome() {
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('content-frame').src = "";
            document.getElementById('home').style.display = 'flex';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function logout() { location.reload(); }
        
        // Force video play on some mobile browsers
        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            video.play().catch(e => console.log("Auto-play blocked, waiting for interaction."));
        });
    </script>
</body>
</html>
