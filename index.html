<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #04509D; --accent: #e67e22; 
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background-color: transparent; color: white; overflow: hidden; }

        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: rgba(15, 15, 15, 0.8); padding: 50px 40px; border-radius: 25px; border: 1px solid var(--glass-border); text-align: center; max-width: 400px; width: 85%; }
        .login-box img { height: 60px; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(255,255,255,0.9); font-size: 14px; text-align: center; color: #333; }
        .login-box button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        #main-portal { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(4, 80, 157, 0.2); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; padding: 10px 30px; z-index: 100; box-sizing: border-box; }
        .nav-logo { height: 32px; }
        .nav-tabs { display: flex; gap: 10px; }
        .tab-btn { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; display: none; }
        .tab-btn:hover { background: white; color: var(--primary); }

        .dashboard-center { text-align: center; }
        .dashboard-center h1 { font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .menu-grid { display: flex; gap: 20px; margin-top: 45px; flex-wrap: wrap; justify-content: center; }
        .menu-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px 30px; border-radius: 20px; border: 1px solid var(--glass-border); transition: 0.4s; cursor: pointer; width: 200px; box-sizing: border-box; display: none; }
        .menu-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .menu-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; display: block; }

        #content-frame { width: 100%; height: calc(100% - 60px); margin-top: 60px; border: none; background: white; display: none; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" alt="Brothers Logo">
            <h2 style="margin:0; font-weight:800;">EXECUTIVE HUB</h2>
            <p id="login-status" style="color:#aaa; font-size: 11px; margin-bottom: 20px;">FIREBASE SECURED ACCESS</p>
            <input type="text" id="user-field" placeholder="Username">
            <input type="password" id="pass-field" placeholder="Password">
            <button onclick="attemptLogin()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <div onclick="showHome()" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" class="nav-logo">
                <span style="font-weight: 800; letter-spacing: 1px;">BROTHERS EGY</span>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/', this)">Price Proposal</button>
                <button class="tab-btn access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/', this)">English Contract</button>
                <button class="tab-btn access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/', this)">Arabic Contract</button>
                <button class="tab-btn access-rec" onclick="loadFrame('receipt.html', this)">Digital Receipt</button>
            </div>
            <div class="nav-controls">
                <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div id="home-content" class="dashboard-center">
            <h1>Executive Dashboard</h1>
            <p style="opacity: 0.7;">Role: <span id="display-role" style="color:var(--accent); font-weight:bold;">-</span></p>
            <div class="menu-grid">
                <div class="menu-card access-quote" onclick="loadFrame('https://sabryabr.github.io/Brothers-Quotation/')">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <h4>Price Proposal</h4>
                </div>
                <div class="menu-card access-en" onclick="loadFrame('https://sabryabr.github.io/Brothers-contract/')">
                    <i class="fa-solid fa-shield-halved"></i>
                    <h4>English Contract</h4>
                </div>
                <div class="menu-card access-ar" onclick="loadFrame('https://sabryabr.github.io/BrothersEGY-AR-Contract/')">
                    <i class="fa-solid fa-file-signature"></i>
                    <h4>Arabic Contract</h4>
                </div>
                <div class="menu-card access-rec" onclick="loadFrame('receipt.html')">
                    <i class="fa-solid fa-receipt"></i>
                    <h4>Digital Receipt</h4>
                </div>
            </div>
        </div>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            authDomain: "brothers-egy-portal.firebaseapp.com",
            projectId: "brothers-egy-portal",
            storageBucket: "brothers-egy-portal.firebasestorage.app",
            messagingSenderId: "673531280760",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d",
            measurementId: "G-YV2SHPQYT9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function attemptLogin() {
            const user = document.getElementById('user-field').value.toLowerCase();
            const pass = document.getElementById('pass-field').value;
            const status = document.getElementById('login-status');
            if(!user || !pass) return;
            try {
                const userDoc = await db.collection("users").doc(user).get();
                if (userDoc.exists && userDoc.data().password === pass) {
                    const data = userDoc.data();
                    applyPermissions(data.access);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    document.getElementById('display-role').innerText = data.role || "Employee";
                } else { throw new Error("Invalid Credentials"); }
            } catch (err) { status.innerText = "ACCESS DENIED: " + err.message; status.style.color = "#ff4d4d"; }
        }

        function applyPermissions(accessArray) {
            if (accessArray.includes(1)) document.querySelectorAll('.access-quote').forEach(el => el.style.display = 'block');
            if (accessArray.includes(2)) document.querySelectorAll('.access-en').forEach(el => el.style.display = 'block');
            if (accessArray.includes(3)) document.querySelectorAll('.access-ar').forEach(el => el.style.display = 'block');
            if (accessArray.includes(4)) document.querySelectorAll('.access-rec').forEach(el => el.style.display = 'block');
        }

        function loadFrame(url, btn) {
            document.getElementById('home-content').style.display = 'none';
            const f = document.getElementById('content-frame');
            f.style.display = 'block'; f.src = url;
            document.querySelectorAll('.tab-btn').forEach(b => { b.style.background = 'rgba(255,255,255,0.05)'; b.style.color = 'white'; });
            if(btn) { btn.style.background = 'white'; btn.style.color = '#04509D'; }
        }

        function showHome() {
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('home-content').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => { b.style.background = 'rgba(255,255,255,0.05)'; b.style.color = 'white'; });
        }
    </script>
</body>
</html>
