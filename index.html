<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY - Data Migrator 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #04509D; --accent: #e67e22; --success: #50fa7b; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 450px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #log { background: #000; border: 1px solid #222; height: 150px; margin-top: 20px; overflow-y: auto; text-align: left; padding: 10px; font-family: monospace; font-size: 11px; color: var(--success); }
    </style>
</head>
<body>

    <div class="card" id="app">
        <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="40">
        <h3>Master Data Migrator</h3>
        <select id="sheet-type">
            <option value="fleet">1. Fleet (السيارات)</option>
            <option value="customers">2. Customers (العملاء)</option>
            <option value="bookings">3. Orders (تسجيل الطلبات)</option>
            <option value="collections">4. Collections (التحصيلات)</option>
            <option value="car_expenses">5. Car Expenses (مصروفات السيارات)</option>
            <option value="gen_expenses">6. Gen Expenses (المصروفات العامة)</option>
        </select>
        <input type="file" id="csv-input" accept=".csv">
        <button id="sync-btn" onclick="startMigration()">START BATCH SYNC</button>
        <div id="log">> System Ready. Select file...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function startMigration() {
            const fileInput = document.getElementById('csv-input');
            const type = document.getElementById('sheet-type').value;
            const btn = document.getElementById('sync-btn');
            
            if(!fileInput.files[0]) return alert("Please select a CSV file first!");

            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            log(`Starting migration for: ${type}`);

            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/);
                // Clean headers
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                let batch = db.batch();
                let count = 0;
                let batchCount = 0;

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;

                    // This specific regex handles commas inside quoted currency/text
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const id = cols[0].trim().replace(/"/g, '');

                    if (id) {
                        const docRef = db.collection(type).doc(id);
                        let data = {};
                        
                        cols.forEach((val, idx) => {
                            const headerName = headers[idx] || `Column_${idx}`;
                            data[headerName] = val ? val.trim().replace(/"/g, '') : "";
                        });

                        batch.set(docRef, data, { merge: true });
                        count++;
                        batchCount++;

                        if (batchCount === 450) { // Firebase limit is 500 per batch
                            log(`Saving batch... (Total: ${count})`);
                            await batch.commit();
                            batch = db.batch();
                            batchCount = 0;
                        }
                    }
                }

                if (batchCount > 0) await batch.commit();
                log(`SUCCESS: ${count} records migrated.`);
                btn.disabled = false;
                btn.innerText = "START BATCH SYNC";
                alert("Migration Finished Successfully!");
            };
            reader.readAsText(fileInput.files[0], 'UTF-8');
        }
    </script>
</body>
</html>
