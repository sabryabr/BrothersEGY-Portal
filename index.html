<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive ERP 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root { 
            --primary: #04509D; --accent: #e67e22; 
            --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --rented: #ff4b4b; --available: #1a1f29; --success: #50fa7b;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', 'Cairo', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.25); }

        #main-portal { display: none; height: 100vh; width: 100%; flex-direction: column; padding-top: 70px; }
        
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; padding: 10px 30px; z-index: 100; box-sizing: border-box; }
        .nav-logo { height: 30px; }
        .nav-tabs { display: flex; gap: 5px; }
        .tab-btn { background: transparent; color: #aaa; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { color: var(--success); border-bottom: 2px solid var(--success); border-radius: 0; }

        /* Metric Cards */
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 40px; }
        .metric-card { background: linear-gradient(145deg, #1e2530 0%, #262c36 100%); border: 1px solid #3b4252; border-radius: 12px; padding: 15px 20px; }
        .metric-card label { font-size: 10px; font-weight: 600; color: #8f9bba; text-transform: uppercase; display: block; }
        .metric-card .val { font-size: 24px; font-weight: 800; color: var(--success); }

        /* Timeline / Gantt */
        .timeline-container { flex-grow: 1; margin: 0 40px 20px; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); border-radius: 15px; overflow-y: auto; padding: 20px; }
        .car-row { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #222; }
        .car-label { width: 250px; font-size: 12px; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .car-track { flex-grow: 1; height: 30px; background: #151921; border-radius: 6px; position: relative; overflow: hidden; }
        .booking-bar { position: absolute; height: 100%; background: var(--rented); opacity: 0.85; border-radius: 4px; border-right: 2px solid rgba(0,0,0,0.3); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { display: block; width: 260px; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
    </style>
</head>
<body>
    <div class="video-wrapper"><video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:50px; margin-bottom:20px;">
            <input type="text" id="user-field" placeholder="Username">
            <input type="password" id="pass-field" placeholder="Password">
            <button onclick="attemptLogin()" style="width:285px; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">ACCESS HUB</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" class="nav-logo">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="loadFrame('receipt.html')">Digital Receipt</button>
                <button class="tab-btn active" onclick="showHome()">Fleet Control Tower</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div id="home-content">
            <div class="metrics-bar">
                <div class="metric-card"><label>Active Rentals</label><span class="val" id="count-active">0</span></div>
                <div class="metric-card"><label>Available Now</label><span class="val" id="count-ready">0</span></div>
                <div class="metric-card"><label>Due Out (Today)</label><span class="val" id="count-out" style="color:var(--accent)">0</span></div>
                <div class="metric-card"><label>Due In (Today)</label><span class="val" id="count-in" style="color:#42a5f5">0</span></div>
            </div>
            <div class="timeline-container">
                <h3 style="margin-top:0;">🗓️ Live Fleet Radar (Last 3 Years)</h3>
                <div id="gantt-grid"></div>
            </div>
        </div>
        <iframe id="content-frame" style="display:none; width:100%; height:calc(100vh - 70px); border:none;" src=""></iframe>
    </div>

    <script>
        // CONFIG - Replace with your key!
        const GOOGLE_API_KEY = "AIzaSyA1dKYFgW45oXnEZmxX9yfbgkos5AbpzSk"; 
        const ORDER_SHEET_ID = "1T6j2xnRBTY31crQcJHioKurs4Rvaj-VlEQkm6joGxGM";
        const FLEET_SHEET_ID = "1tQVkPj7tCnrKsHEIs04a1WzzC04jpOWuLsXgXOkVMkk";

        firebase.initializeApp({
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        });
        const db = firebase.firestore();

        async function attemptLogin() {
            const user = document.getElementById('user-field').value.toLowerCase();
            const pass = document.getElementById('pass-field').value;
            const doc = await db.collection("users").doc(user).get();
            if (doc.exists && doc.data().password === pass) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-portal').style.display = 'flex';
                initGoogleAPI();
            } else { alert("Unauthorized"); }
        }

        function initGoogleAPI() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
                loadData();
            });
        }

        async function loadData() {
            // Fetch All 3 Years of History
            const orders = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: ORDER_SHEET_ID, range: "'صفحة الإدخالات للإيجارات'!A:ZZ" });
            const fleet = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: FLEET_SHEET_ID, range: "'صفحة الإدخالات لقاعدة البيانات'!A:ZZ" });
            renderTimeline(orders.result.values, fleet.result.values);
        }

        function renderTimeline(orders, fleet) {
            const grid = document.getElementById('gantt-grid');
            grid.innerHTML = "";
            let active = 0, ready = 0;
            const today = new Date();

            // Logic to draw bars based on Start (Col L) and End (Col T)
            fleet.slice(1).forEach(car => {
                const carId = car[0];
                const carName = `${car[1]} ${car[4]} (${car[7]})`;
                if (!carId) return;

                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class="car-label">#${carId} ${carName}</div><div class="car-track" id="track-${carId}"></div>`;
                grid.appendChild(row);

                // Find all bookings for this car
                orders.slice(2).filter(o => o[3] == carId).forEach(order => {
                    const s = new Date(order[11]); // Col L
                    const e = new Date(order[19]); // Col T
                    if (isNaN(s) || isNaN(e)) return;

                    if (s <= today && e >= today) active++;
                    
                    // Simplified Gantt calc: width based on month percentage
                    const startPos = (s.getDate() / 31) * 100;
                    const duration = ((e - s) / (1000 * 60 * 60 * 24 * 31)) * 100;

                    const bar = document.createElement('div');
                    bar.className = 'booking-bar';
                    bar.style.left = `${startPos}%`;
                    bar.style.width = `${duration}%`;
                    document.getElementById(`track-${carId}`).appendChild(bar);
                });
            });
            document.getElementById('count-active').innerText = active;
            document.getElementById('count-ready').innerText = fleet.length - active;
        }

        function loadFrame(url) {
            document.getElementById('home-content').style.display = 'none';
            const f = document.getElementById('content-frame');
            f.style.display = 'block'; f.src = url;
        }

        function showHome() {
            document.getElementById('content-frame').style.display = 'none';
            document.getElementById('home-content').style.display = 'block';
        }
    </script>
</body>
</html>
