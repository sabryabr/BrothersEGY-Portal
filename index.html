<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY - Executive ERP 3.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #04509D; --rented: #ff4b4b; --success: #50fa7b; --accent: #e67e22; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', 'Cairo', sans-serif; height: 100vh; overflow: hidden; }
        
        .video-wrapper { position: fixed; inset: 0; z-index: -1; background: #000; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }

        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        .nav-tabs { display: flex; gap: 10px; }
        .tab-btn { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .tab-btn.active { border-color: var(--success); color: var(--success); background: rgba(80, 250, 123, 0.05); }

        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; }
        input { display: block; width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }

        #main-portal { display: none; flex-direction: column; height: 100vh; padding-top: 70px; }
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 14px; padding: 15px; }
        .metric-card label { font-size: 9px; color: #555; text-transform: uppercase; }
        .metric-card .val { font-size: 20px; font-weight: 800; color: var(--success); margin-top: 4px; }

        .content-area { flex-grow: 1; margin: 0 30px 20px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 18px; padding: 20px; overflow-y: auto; }
        
        /* Progress Box */
        .progress-box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .progress-bar-inner { height: 4px; background: var(--success); width: 0%; transition: 0.3s; margin-top: 10px; }

        /* Gantt Grid */
        .car-row { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #111; }
        .car-info { width: 180px; font-size: 11px; color: #ccc; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .car-track { flex-grow: 1; height: 20px; background: #0a0a0a; border-radius: 4px; position: relative; }
        .bar { position: absolute; height: 100%; background: var(--rented); border-radius: 3px; box-shadow: 0 0 8px rgba(255,75,75,0.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { text-align: left; color: #444; padding: 10px; border-bottom: 2px solid #222; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <div class="video-wrapper"><video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video></div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:45px; margin-bottom:25px;">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="login-btn" onclick="login()">PORTAL ACCESS</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:32px; cursor:pointer;" onclick="location.reload()">
            <div class="nav-tabs">
                <button class="tab-btn active" id="tab-radar" onclick="showRadar(this)">Fleet Radar</button>
                <button class="tab-btn" onclick="showSettlements(this)">Owner Payouts</button>
                <button class="tab-btn" onclick="showImporter(this)">Bulk Import</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; cursor:pointer; font-size:16px;"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <div id="dashboard-view">
            <div class="metrics-bar">
                <div class="metric-card"><label>Active Units</label><div class="val" id="m-active">0</div></div>
                <div class="metric-card"><label>Total Fleet</label><div class="val" id="m-fleet">0</div></div>
                <div class="metric-card"><label>Revenue</label><div class="val" id="m-rev">0 EGP</div></div>
                <div class="metric-card"><label>Balances</label><div class="val" id="m-bal" style="color:var(--accent)">0 EGP</div></div>
            </div>
            <div class="content-area" id="main-content"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            try {
                const doc = await db.collection("users").doc(u).get();
                if (doc.exists && doc.data().password === p) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-portal').style.display = 'flex';
                    loadAllData();
                } else { alert("Access Denied"); }
            } catch (e) { alert("Firebase Connection Failed"); }
        }

        async function loadAllData() {
            window.fleetSnap = await db.collection("fleet").get();
            window.bookingSnap = await db.collection("bookings").get();
            renderRadar();
        }

        // --- THE ROBUST CSV PARSER ---
        function parseCSVLine(line) {
            const result = [];
            let current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result;
        }

        function cleanNum(val) {
            if (!val || val.includes('#')) return 0;
            // Remove everything except numbers and dots
            return parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
        }

        function showImporter(btn) {
            switchTab(btn);
            document.getElementById('main-content').innerHTML = `
                <div class="progress-box">
                    <h3>Bulk History Importer</h3>
                    <p>Upload 'تسجيل الطلبات.csv' to fill the 3-Year History.</p>
                    <input type="file" id="csvFile" accept=".csv" style="margin:20px 0;">
                    <button class="login-btn" onclick="pumpData()">START IMPORT</button>
                    <div id="pump-log" style="margin-top:10px; font-size:11px; color:#666;">Ready...</div>
                    <div style="background:#222; height:4px; margin-top:15px;"><div id="p-bar" class="progress-bar-inner"></div></div>
                </div>`;
        }

        async function pumpData() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert("Select file first!");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/).slice(1);
                const log = document.getElementById('pump-log');
                const bar = document.getElementById('p-bar');
                
                let count = 0;
                for (let i = 0; i < lines.length; i++) {
                    const cols = parseCSVLine(lines[i]);
                    if (cols[0] && !isNaN(cols[0])) {
                        try {
                            // Column Map based on your file:
                            // 0: No, 3: CarId, 2: Client, 11: Start, 19: End, 22: DailyRate, 49: Paid
                            await db.collection('bookings').doc(cols[0]).set({
                                carId: cols[3],
                                client: cols[2],
                                start: cols[11],
                                end: cols[19],
                                dailyRate: cleanNum(cols[22]),
                                paid: cleanNum(cols[49]),
                                total: cleanNum(cols[46])
                            }, { merge: true });
                            
                            count++;
                            if (count % 5 === 0) {
                                log.innerText = `Processing row ${cols[0]}...`;
                                bar.style.width = `${(i/lines.length)*100}%`;
                            }
                        } catch (err) { console.error(err); }
                    }
                }
                alert("Import Complete!");
                location.reload();
            };
            reader.readAsText(file, 'UTF-8');
        }

        function renderRadar() {
            const content = document.getElementById('main-content');
            content.innerHTML = `<h4 style="margin:0 0 15px; font-size:10px; color:#555;">🗓️ FLEET RADAR TIMELINE</h4>`;
            
            let totalRev = 0, active = 0;
            window.fleetSnap.forEach(doc => {
                const car = doc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class="car-info">#${doc.id} ${car.model || 'Vehicle'}</div><div class="car-track" id="t-${doc.id}"></div>`;
                content.appendChild(row);

                window.bookingSnap.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == doc.id) {
                        totalRev += b.total || 0;
                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.left = "15%"; bar.style.width = "20%";
                        document.getElementById(`t-${doc.id}`).appendChild(bar);
                    }
                });
            });

            document.getElementById('m-fleet').innerText = window.fleetSnap.size;
            document.getElementById('m-rev').innerText = totalRev.toLocaleString() + " EGP";
        }

        function showSettlements(btn) {
            switchTab(btn);
            const content = document.getElementById('main-content');
            content.innerHTML = `<h3>💰 Owner Payouts</h3><table><thead><tr><th>Car</th><th>Agreement (CJ)</th><th>Deduct (CL)</th><th>Net Payout</th></tr></thead><tbody id="p-list"></tbody></table>`;
            
            window.fleetSnap.forEach(doc => {
                const car = doc.data();
                if(car.basePayment) {
                    const net = car.basePayment - (car.basePayment * (car.commissionPct / 100));
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>#${doc.id} ${car.model}</td><td>${car.basePayment.toLocaleString()}</td><td style="color:red">-${car.commissionPct}%</td><td style="color:var(--success); font-weight:800;">${net.toLocaleString()} EGP</td>`;
                    document.getElementById('p-list').appendChild(tr);
                }
            });
        }

        function switchTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showRadar(btn) { switchTab(btn); renderRadar(); }
    </script>
</body>
</html>
