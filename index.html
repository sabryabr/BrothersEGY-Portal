<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brothers EGY - Executive ERP 3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #04509D; --success: #50fa7b; --rented: #ff4b4b; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* Navigation */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 100; box-sizing: border-box; }
        .nav-links { display: flex; gap: 15px; }
        .tab-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .tab-btn:hover { border-color: var(--success); }

        /* Login */
        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }

        /* Dashboard Layout */
        #main-portal { display: none; padding-top: 80px; height: 100vh; flex-direction: column; }
        .metrics-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; padding: 15px; }
        .val { font-size: 20px; font-weight: bold; color: var(--success); }
        .content-area { flex-grow: 1; margin: 0 30px 20px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 15px; padding: 20px; overflow-y: auto; }
        
        /* Gantt Radar */
        .car-row { display: flex; align-items: center; height: 45px; border-bottom: 1px solid #111; }
        .car-label { width: 180px; font-size: 11px; color: #888; }
        .car-track { flex-grow: 1; height: 20px; background: #0a0a0a; border-radius: 4px; position: relative; }
        .bar { position: absolute; height: 100%; background: var(--rented); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:45px; margin-bottom:20px;">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SIGN IN</button>
        </div>
    </div>

    <div id="main-portal">
        <nav class="navbar">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" style="height:32px;">
            <div class="nav-links">
                <button class="tab-btn" onclick="location.reload()">Fleet Radar</button>
                <button class="tab-btn" onclick="showImporter()">Bulk Import</button>
                <button class="tab-btn" onclick="location.reload()"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div class="metrics-bar">
            <div class="metric-card"><label>Fleet Size</label><div class="val" id="m-fleet">0</div></div>
            <div class="metric-card"><label>Active Orders</label><div class="val" id="m-count">0</div></div>
            <div class="metric-card"><label>Total Rev (EGP)</label><div class="val" id="m-rev">0</div></div>
            <div class="metric-card"><label>Database</label><div class="val" style="color:var(--success)">Connected</div></div>
        </div>

        <div class="content-area" id="main-content">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            const doc = await db.collection("users").doc(u).get();
            if (doc.exists && doc.data().password === p) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-portal').style.display = 'flex';
                loadDashboard();
            } else { alert("Invalid Credentials"); }
        }

        async function loadDashboard() {
            const fleet = await db.collection("fleet").get();
            const bookings = await db.collection("bookings").get();
            
            document.getElementById('m-fleet').innerText = fleet.size;
            document.getElementById('m-count').innerText = bookings.size;
            
            const grid = document.getElementById('main-content');
            grid.innerHTML = "<h4>🗓️ LIVE FLEET RADAR</h4><div id='radar-grid'></div>";
            
            let revenue = 0;
            fleet.forEach(carDoc => {
                const car = carDoc.data();
                const row = document.createElement('div');
                row.className = 'car-row';
                row.innerHTML = `<div class='car-label'>#${carDoc.id} ${car.model || ''}</div><div class='car-track' id='t-${carDoc.id}'></div>`;
                document.getElementById('radar-grid').appendChild(row);

                bookings.forEach(bDoc => {
                    const b = bDoc.data();
                    if(b.carId == carDoc.id) {
                        revenue += (parseFloat(b.total) || 0);
                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.left = "15%"; bar.style.width = "20%";
                        document.getElementById(`t-${carDoc.id}`).appendChild(bar);
                    }
                });
            });
            document.getElementById('m-rev').innerText = revenue.toLocaleString();
        }

        function showImporter() {
            document.getElementById('main-content').innerHTML = `
                <div style="padding:40px; text-align:center; background:rgba(255,255,255,0.02); border-radius:15px; border:1px dashed #333;">
                    <h3 style="color:var(--success)">Bulk CSV Sync Engine</h3>
                    <p style="color:#666">Upload your 'تسجيل الطلبات' CSV to populate 3-Year History.</p>
                    <input type="file" id="csvFile" accept=".csv" style="margin:20px 0; color:white;">
                    <br>
                    <button onclick="handleCSV()" style="padding:15px 30px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">START SYNC</button>
                    <div id="status" style="margin-top:20px; font-weight:bold;"></div>
                </div>`;
        }

        async function handleCSV() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Select file!");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                // SMART INDEX FINDER (Finds column even if names change slightly)
                const findIdx = (keywords) => headers.findIndex(h => keywords.some(k => h.includes(k)));
                
                const idxNo = findIdx(['No', 'مسلسل', 'رقم']);
                const idxCar = findIdx(['كود السيارة', 'Car ID', 'كود السياره']);
                const idxRate = findIdx(['سعر السيارة اليومي', 'Rate', 'السعر']);
                const idxDays = findIdx(['مدة الخدمة يوم', 'Days', 'المده']);
                const idxPaid = findIdx(['المدفوع', 'Paid']);
        
                console.log("Indices found:", { idxNo, idxCar, idxRate, idxDays });
        
                if (idxNo === -1 || idxCar === -1) {
                    return alert("Error: Could not find 'No.' or 'Car ID' columns. Check CSV headers.");
                }
        
                let count = 0;
                const status = document.getElementById('status');
                
                for (let i = 1; i < lines.length; i++) {
                    // This regex handles commas inside currency (e.g. "1,800.00")
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
                    
                    if (cols[idxNo]) {
                        // Clean the numbers (Remove £, commas, spaces)
                        const cleanNum = (str) => parseFloat(str?.replace(/[^\d.]/g, '')) || 0;
                        
                        const rate = cleanNum(cols[idxRate]);
                        const days = cleanNum(cols[idxDays]) || 1;
                        const paid = cleanNum(cols[idxPaid]);
                        const total = rate * days;
        
                        try {
                            await db.collection('bookings').doc(cols[idxNo]).set({
                                carId: cols[idxCar],
                                total: total,
                                paid: paid,
                                timestamp: Date.now()
                            }, { merge: true });
                            
                            count++;
                            status.innerText = `✅ Synced Row #${cols[idxNo]}... (${count} total)`;
                        } catch (err) {
                            console.error("Firestore Error:", err);
                        }
                    }
                }
                alert("Success! " + count + " rows synced to Brothers EGY Database.");
                location.reload();
            };
            reader.readAsText(file, 'UTF-8');
        }
    </script>
</body>
</html>
