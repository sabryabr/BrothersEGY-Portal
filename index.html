<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers EGY | Executive ERP 4.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #04509D; --accent: #e67e22; --success: #2ecc71; --danger: #e74c3c;
            --bg: #05070a; --card: #11141d; --border: rgba(255,255,255,0.08);
            --sidebar-w: 240px;
        }

        body, html { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Sidebar Glassmorphism */
        .sidebar { width: var(--sidebar-w); height: 100vh; position: fixed; background: rgba(10,14,24,0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 100; }
        .logo { margin-bottom: 40px; text-align: center; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: #888; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(4,80,157,0.3); }
        .nav-item i { width: 20px; }

        /* Main Content */
        .main { margin-left: var(--sidebar-w); padding: 30px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        
        /* Modern Metric Cards */
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .m-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; position: relative; overflow: hidden; }
        .m-card label { color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .m-card .val { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .m-card .trend { font-size: 11px; color: var(--success); }

        /* Search & Filters */
        .search-bar { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* Modern Table */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px 20px; background: rgba(255,255,255,0.02); color: #555; font-size: 12px; text-transform: uppercase; }
        td { padding: 15px 20px; border-top: 1px solid var(--border); font-size: 14px; color: #ccc; }
        tr:hover { background: rgba(255,255,255,0.01); }

        /* Badges */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-active { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .bg-warn { background: rgba(230, 126, 34, 0.1); color: var(--accent); }

        /* Edit Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1a1e26; width: 500px; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0c0e14; color: white; box-sizing: border-box; }
        .btn-save { background: var(--success); color: #000; font-weight: bold; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; width: 100%; }

        #login-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        
        .loading-shimmer { background: linear-gradient(90deg, #111, #222, #111); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="45">
            <h2 style="margin: 20px 0;">PORTAL ACCESS</h2>
            <input type="text" id="user-f" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #333; background:#000; color:white;">
            <input type="password" id="pass-f" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #333; background:#000; color:white;">
            <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">AUTHORIZE</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar-ui" style="display:none;">
        <div class="logo"><img src="https://brothersegy.com/wp-content/uploads/2026/02/12345.png" height="30"></div>
        <div class="nav-item active" onclick="navigate('dashboard', this)"><i class="fa-solid fa-gauge"></i> Executive Radar</div>
        <div class="nav-item" onclick="navigate('fleet', this)"><i class="fa-solid fa-car"></i> Fleet Master</div>
        <div class="nav-item" onclick="navigate('bookings', this)"><i class="fa-solid fa-calendar-days"></i> Order Book</div>
        <div class="nav-item" onclick="navigate('customers', this)"><i class="fa-solid fa-users"></i> CRM Hub</div>
        <div class="nav-item" onclick="navigate('pnl', this)" id="nav-pnl" style="display:none;"><i class="fa-solid fa-chart-line"></i> Financial HQ</div>
        <div class="nav-item" onclick="navigate('pump', this)" style="margin-top:auto;"><i class="fa-solid fa-upload"></i> Data Pump</div>
        <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Logout</div>
    </div>

    <div class="main" id="main-ui" style="display:none;">
        <div id="view-header">
            <h1 id="view-title">Executive Radar</h1>
            <p id="view-desc" style="color:#666; margin-top:-10px;">Live Fleet & Operational Overview</p>
        </div>

        <div class="metrics-grid" id="metrics-bar">
            <div class="m-card"><label>Active Rentals</label><div class="val" id="met-active">0</div><div class="trend">Live Tracking</div></div>
            <div class="m-card"><label>Total Fleet</label><div class="val" id="met-fleet">0</div><div class="trend">Registered Cars</div></div>
            <div class="m-card"><label>Monthly Revenue</label><div class="val" id="met-rev">0 EGP</div><div class="trend" style="color:var(--accent)">Projected</div></div>
            <div class="m-card"><label>Risk Alerts</label><div class="val" id="met-risk" style="color:var(--danger)">0</div><div class="trend">Action Required</div></div>
        </div>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass" style="color:#555"></i>
            <input type="text" id="global-search" placeholder="Search ID, Model, Plate, or Customer Name..." onkeyup="filterTable()">
        </div>

        <div class="table-container">
            <table id="master-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h2 id="modal-title">Edit Record</h2>
            <div id="modal-fields"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-save" onclick="saveRecord()">UPDATE DATABASE</button>
                <button onclick="closeModal()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNY5lqsr_EoWQxhK7WN4WCJP2_V7IcwFc",
            projectId: "brothers-egy-portal",
            appId: "1:673531280760:web:f0d5484c0e8eabc1dd9c8d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let activeView = 'dashboard';
        let currentEditRef = null;

        async function login() {
            const u = document.getElementById('user-f').value.toLowerCase().trim();
            const p = document.getElementById('pass-f').value;
            try {
                const doc = await db.collection("users").doc(u).get();
                if (doc.exists && doc.data().password === p) {
                    currentUser = doc.data();
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('sidebar-ui').style.display = 'flex';
                    document.getElementById('main-ui').style.display = 'block';
                    if (currentUser.access.includes(7)) document.getElementById('nav-pnl').style.display = 'flex';
                    loadView('dashboard');
                } else { alert("Invalid Credentials"); }
            } catch (e) { alert("Auth Error: " + e.message); }
        }

        function navigate(view, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            activeView = view;
            loadView(view);
        }

        async function loadView(view) {
            const body = document.getElementById('table-body');
            const head = document.getElementById('table-head');
            body.innerHTML = '<tr><td colspan="6" style="text-align:center">Loading Cloud Data...</td></tr>';

            const querySnapshot = await db.collection(view === 'dashboard' ? 'bookings' : view).limit(500).get();
            
            if (view === 'dashboard') {
                head.innerHTML = '<th>Order ID</th><th>Customer</th><th>Car</th><th>Return Date</th><th>Status</th><th>Actions</th>';
                renderBookings(querySnapshot, body);
            } else if (view === 'fleet') {
                head.innerHTML = '<th>Car ID</th><th>Model</th><th>Plate</th><th>Base Payout</th><th>Status</th><th>Actions</th>';
                renderFleet(querySnapshot, body);
            } else if (view === 'customers') {
                head.innerHTML = '<th>ID</th><th>Full Name</th><th>Phone</th><th>Passport</th><th>Actions</th>';
                renderCustomers(querySnapshot, body);
            }
            updateMetrics();
        }

        function renderBookings(snap, body) {
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const row = body.insertRow();
                row.innerHTML = `
                    <td><b>#${doc.id}</b></td>
                    <td>${d['اسم العميل'] || '-'}</td>
                    <td>${d['اسم السيارة'] || '-'}</td>
                    <td>${d['نهاية التعاقد'] || '-'}</td>
                    <td><span class="badge bg-active">Active</span></td>
                    <td><i class="fa-solid fa-pen-to-square" style="cursor:pointer" onclick="openEdit('bookings', '${doc.id}')"></i></td>
                `;
            });
        }

        function renderFleet(snap, body) {
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const row = body.insertRow();
                row.innerHTML = `
                    <td><b>#${doc.id}</b></td>
                    <td>${d['Model'] || d['الطراز'] || '-'}</td>
                    <td>${d['رقم اللوحة'] || ''} ${d['احرف اللوحة'] || ''}</td>
                    <td>${d['القيمة المالية'] || '0'}</td>
                    <td><span class="badge bg-active">Operational</span></td>
                    <td><i class="fa-solid fa-pen-to-square" style="cursor:pointer" onclick="openEdit('fleet', '${doc.id}')"></i></td>
                `;
            });
        }

        function openEdit(coll, id) {
            if (!currentUser.access.includes(6) && !currentUser.access.includes(7)) return alert("Access Denied: Read Only");
            currentEditRef = { coll, id };
            const modal = document.getElementById('edit-modal');
            const fieldsDiv = document.getElementById('modal-fields');
            fieldsDiv.innerHTML = "Fetching current data...";
            modal.style.display = 'flex';

            db.collection(coll).doc(id).get().then(doc => {
                const data = doc.data();
                fieldsDiv.innerHTML = "";
                Object.keys(data).forEach(key => {
                    if (key.startsWith('_')) return;
                    fieldsDiv.innerHTML += `
                        <div class="form-group">
                            <label>${key}</label>
                            <input type="text" id="edit-${key}" value="${data[key]}">
                        </div>`;
                });
            });
        }

        async function saveRecord() {
            const inputs = document.querySelectorAll('#modal-fields input');
            let updateData = { _sys_edited_at: Date.now() };
            inputs.forEach(input => {
                const key = input.id.replace('edit-', '');
                updateData[key] = input.value;
            });
            await db.collection(currentEditRef.coll).doc(currentEditRef.id).update(updateData);
            alert("Record Updated Successfully!");
            closeModal();
            loadView(activeView);
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function updateMetrics() {
            const bSnap = await db.collection('bookings').get();
            const fSnap = await db.collection('fleet').get();
            document.getElementById('met-active').innerText = bSnap.size;
            document.getElementById('met-fleet').innerText = fSnap.size;
        }

        function filterTable() {
            const q = document.getElementById('global-search').value.toLowerCase();
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(q) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
